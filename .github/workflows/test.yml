name: tests

# Runs the Golden Test (4595 Bronson must stay exact), the QB parser tests, and the
# calc drift guard on every push/PR. See CLAUDE.md "GOLDEN TEST" for the acceptance bar.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm test
