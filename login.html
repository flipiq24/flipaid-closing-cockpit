<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FlipAid · Sign in</title>
<style>
  :root{
    --bg:#f3f4f6; --card:#fff; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb;
    --accent:#f97316; --accent-soft:#fff1e6; --red:#dc2626; --radius:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1200px 600px at 50% -10%,#fff6ee 0%,var(--bg) 55%);
    color:var(--ink);font:15px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;padding:24px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:0 18px 50px rgba(17,24,39,.08);width:100%;max-width:400px;padding:34px 32px}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .dot{width:12px;height:12px;border-radius:50%;background:var(--accent)}
  .brand b{font-size:20px;font-weight:800;letter-spacing:-.01em}
  .tag{color:var(--muted);font-size:13px;margin:0 0 22px}
  h1{font-size:18px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 20px}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 5px;font-weight:600}
  input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;background:#fff;margin-bottom:14px}
  input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:12px;font-weight:700;font-size:14px;cursor:pointer}
  .btn:hover{filter:brightness(.97)}
  .btn:disabled{opacity:.6;cursor:default}
  .err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;border-radius:9px;padding:10px 12px;font-size:13px;margin-bottom:14px;display:none}
  .err.show{display:block}
  .toggle{margin-top:18px;text-align:center;font-size:13px;color:var(--muted)}
  .toggle a{color:var(--accent);font-weight:700;cursor:pointer;text-decoration:none}
  .toggle a:hover{text-decoration:underline}
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><span class="dot"></span><b>FlipAid</b></div>
    <p class="tag">Closing Cockpit</p>
    <h1 id="formTitle">Welcome back</h1>
    <p class="sub" id="formSub">Sign in to your property portfolio.</p>
    <div class="err" id="err"></div>
    <form id="authForm" autocomplete="on">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" placeholder="you@example.com" required>
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
      <button class="btn" id="submitBtn" type="submit">Sign in</button>
    </form>
    <div class="toggle" id="toggle">
      New here? <a id="toggleLink" onclick="toggleMode()">Create an account</a>
    </div>
  </div>
<script>
let mode = 'login';
const $ = id => document.getElementById(id);
function toggleMode(){
  mode = mode === 'login' ? 'signup' : 'login';
  const signup = mode === 'signup';
  $('formTitle').textContent = signup ? 'Create your account' : 'Welcome back';
  $('formSub').textContent = signup ? 'Start building your property portfolio.' : 'Sign in to your property portfolio.';
  $('submitBtn').textContent = signup ? 'Create account' : 'Sign in';
  $('password').autocomplete = signup ? 'new-password' : 'current-password';
  $('toggle').innerHTML = signup
    ? `Already have an account? <a onclick="toggleMode()">Sign in</a>`
    : `New here? <a onclick="toggleMode()">Create an account</a>`;
  showErr('');
}
function showErr(msg){ const e=$('err'); e.textContent=msg; e.classList.toggle('show', !!msg); }
$('authForm').addEventListener('submit', async ev => {
  ev.preventDefault();
  showErr('');
  const email = $('email').value.trim();
  const password = $('password').value;
  const btn = $('submitBtn'); btn.disabled = true;
  try{
    const res = await fetch('/api/' + (mode === 'signup' ? 'signup' : 'login'), {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email, password })
    });
    const j = await res.json().catch(()=>({}));
    if(!res.ok){ showErr(j.error || 'Something went wrong. Please try again.'); btn.disabled=false; return; }
    location.href = '/portfolio';
  }catch(e){ showErr('Network error. Please try again.'); btn.disabled=false; }
});
// If already signed in, skip straight to the portfolio.
fetch('/api/me').then(r=>{ if(r.ok) location.href='/portfolio'; }).catch(()=>{});
</script>
</body>
</html>
