    </div>
    <div class="ai-draft" id="aiDraft"></div>
    <div class="ai-log" id="aiLog">${renderLog()}</div>
  </div>`;

  $('#panel').innerHTML = `<div class="ia-sheet">${purchase+lender+rehab+gross+net+ainotes}</div>`;
}

/* ----- QB export tab ----- */
function qbRows(){
  const rows=[];
  // An uploaded QB document (parsed into D.qb.lines) overwrites the auto-derived ledger below;
  // manual entries are always kept (see the QB tab warn text).
  if(D.qb && Array.isArray(D.qb.lines) && D.qb.lines.length){
    D.qb.lines.forEach((l,i)=>{
      try{
        const s=lineState('qb',i); if(s.amount==null) return;
        rows.push({Type:'QB', Date:(D.qb.date||''), Name:(D.qb.title||'QuickBooks Accounting'), Memo:(s.label||'(line)'),
                   Category:s.category, Sub:s.sub, Amount:s.amount, side:'qb', idx:i, source:'QB Import', conf:s.confidence});
      }catch(e){ /* skip a malformed parsed line rather than crash the whole ledger */ }
    });
  } else {
  ['buySide','sellSide'].forEach(side=>{
    const source = side==='buySide' ? 'Buy-Side Closing' : 'Sell-Side Closing';
    D[side].lines.forEach((l,i)=>{
      const s=lineState(side,i); if(s.amount==null) return;
      rows.push({Type:D[side].role, Date:D[side].date, Name:D[side].title, Memo:s.label,
                 Category:s.category, Sub:s.sub, Amount:s.amount, side, idx:i, source, conf:s.confidence});
    });
    // Additions: not on the closing statement, but they map into QB + the IA the same way.
    additions(side).forEach((a,idx)=>{
      const fld = a.debit!=null ? 'debit' : (a.credit!=null ? 'credit' : null);
      if(fld==null) return;
      // QB convention (same as statement lines via lineState): debit positive, credit negative.
      const amt = fld==='debit' ? a.debit : -a.credit;
      rows.push({Type:D[side].role, Date:D[side].date, Name:D[side].title, Memo:(a.label||'(addition)'),
                 Category:a.category, Sub:a.sub, Amount:amt, side, idx, isAdd:true, amtField:fld, source, conf:null});
    });
  });
  // Investment-Analysis-only costs that aren't on either closing statement (rehab + misc).
  // Acquisition & financing are intentionally excluded — they're already the buy-side
  // purchase line and the lender-cost lines, so re-adding them would double-count the deal.
  // Broken into their IA sub-components so each maps to a real sub and the rows sum exactly
  // to the IA tab's Rehab + Misc totals. Read-only here; edit them on the IA tab.
  const _i=effIA(), _ia=computeIA(_i);
  const _cSum=(sec)=> ((_i.customLines&&_i.customLines[sec])||[]).reduce((a,l)=>a+(+l.amount||0),0);
  [
    {cat:'Rehabilitation Costs', sub:'Estimated Repairs', label:'Estimated Repairs', amt:+_i.estimatedRepairs||0},
    {cat:'Rehabilitation Costs', sub:'Utilities',         label:'Utilities (rehab)',  amt:+_i.utilitiesRehab||0},
    {cat:'Misc Costs', sub:'ROI Adjustments',     label:'ROI Adjustments',     amt:+_i.roiAdjustments||0},
    {cat:'Misc Costs', sub:'Miscellaneous Costs', label:'Miscellaneous Costs', amt:(+_i.miscellaneousCosts||0)+_cSum('rehab')},
    {cat:'Misc Costs', sub:'Supplemental Taxes',  label:'Supplemental Taxes',  amt:+_ia.supplemental||0},
    {cat:'Misc Costs', sub:'HOA',                 label:'HOA',                 amt:(+_i.hoaMonthly||0)*_ia.months},
  ].forEach((x,idx)=>{
    if(!x.amt) return;
    rows.push({Type:'IA', Date:'', Name:'Investment Analysis', Memo:x.label,
               Category:x.cat, Sub:x.sub, Amount:x.amt, idx, isIA:true, source:'Investment Analysis', conf:null});
  });
  }
  // Manual QB-only entries: keyed in the QB tab, never imported. Source = "QB Accounting".
  qbManual().forEach((m,idx)=>{
    if(m.amount==null && !(m.label||'').trim()) return;
    rows.push({Type:'QB', Date:'', Name:'QB Accounting', Memo:(m.label||'(manual)'),
               Category:m.category, Sub:m.sub, Amount:(+m.amount||0), idx, isManual:true, source:(m.source||'QB'), conf:null});
  });
  return rows;
}
let qbSort={col:'',dir:1};
let qbView={hi:'',filter:''};   // hi = click-to-highlight category; filter = dbl-click-to-show-only category
let qbClickT=null;
// Light row tint + dot colour per category (key must match the taxonomy names exactly).
const QBCOLORS={
  'Purchase Cost':              {bg:'#e0f2fe',dot:'#0ea5e9'},
  'Lender Cost – 1st Loan':     {bg:'#ede9fe',dot:'#7c3aed'},
  'Lender Cost – 2nd Loan':     {bg:'#f5f3ff',dot:'#a855f7'},
  'Rehabilitation Costs':       {bg:'#dcfce7',dot:'#16a34a'},
  'Misc Costs':                 {bg:'#fef9c3',dot:'#ca8a04'},
  'Sales Cost':                 {bg:'#ffe4e6',dot:'#e11d48'},
  'Financing (profit-neutral)': {bg:'#f1f5f9',dot:'#64748b'}
};
function qbCatColor(c){ return QBCOLORS[c] || {bg:'#f8fafc',dot:'#94a3b8'}; }
function qbCatOrder(){ return Object.keys((D&&D.taxonomy&&D.taxonomy.categories)||{}); }
// Default ledger order: canonical category, then sub within that category, then memo.
function qbSortByCatSub(list){
  const co=qbCatOrder();
  const ci=c=>{const i=co.indexOf(c);return i<0?999:i;};
  const si=(c,s)=>{const a=(D.taxonomy.categories[c]||[]);const i=a.indexOf(s);return i<0?999:i;};
  return list.slice().sort((a,b)=>
    ci(a.Category)-ci(b.Category) || si(a.Category,a.Sub)-si(b.Category,b.Sub) ||
    String(a.Memo||'').localeCompare(String(b.Memo||'')));
}
function jsq(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
// Single click highlights the category's lines; double click filters to just that category.
// The 180ms timer lets a double click cancel the pending single-click highlight.
function qbCatClick(c){ clearTimeout(qbClickT); qbClickT=setTimeout(()=>{ qbView.hi=(qbView.hi===c?'':c); render('qb'); },180); }
function qbCatDbl(c){ clearTimeout(qbClickT); qbView.filter=(qbView.filter===c?'':c); qbView.hi=''; render('qb'); }
function qbClearView(){ qbView.hi=''; qbView.filter=''; render('qb'); }
function sortQb(c){ if(qbSort.col===c){ qbSort.dir*=-1; } else { qbSort.col=c; qbSort.dir=1; } render('qb'); }
function qbSortRows(list){
  const c=qbSort.col; if(!c) return list;
  const num=(c==='Amount'||c==='Conf');
  const val=r=>{
    switch(c){
      case 'Date':return r.Date||'';
      case 'Memo':return r.Memo||'';
      case 'Source':return r.source||'';
      case 'Conf':return r.conf==null?-1:+r.conf;
      case 'Category':return r.Category||'';
      case 'Sub':return r.Sub||'';
      case 'Amount':return +r.Amount||0;
    }
    return '';
  };
  return list.slice().sort((a,b)=>{
    const va=val(a),vb=val(b);
    const cmp=num?(va-vb):String(va).localeCompare(String(vb));
    return cmp*qbSort.dir;
  });
}
function renderQB(){
  if(isParsing('qb')){ $('#panel').innerHTML = docChip('qb') + processingCard(); return; }
  const all=qbRows();
  const rows=all.filter(r=>!r.isManual);           // imported statement lines + additions
  const man=qbManual();
  // Empty state: no statement-derived or manual ledger data (only IA roll-ups, if any) -> show ONLY the dropzone.
  if(rows.filter(r=>!r.isIA).length===0 && man.length===0){
    $('#panel').innerHTML = uploadCard('qb') + docChip('qb') + errCard('qb');
    return;
  }
  const {redMan,redImp,matched,unmatched}=qbRecon();
  // category totals (imported + additions + manual) — shown at the top, colour-coded & in taxonomy order.
  const tot={}; all.forEach(r=>tot[r.Category]=(tot[r.Category]||0)+(+r.Amount||0));
  const catsOrdered = qbCatOrder().filter(c=>tot[c]!=null)
    .concat(Object.keys(tot).filter(c=>!qbCatOrder().includes(c)));   // any non-taxonomy cats last
  const totalsHtml=`<div class="section"><h2>Totals by category</h2>
    <div class="help">Click a category to highlight its lines in the ledger · double-click to filter to just that category.</div>
    <table class="qbtot"><tbody>`+
    catsOrdered.map(c=>{const col=qbCatColor(c);
      const act=(qbView.filter===c)?' qb-tot-filter':((qbView.hi===c)?' qb-tot-hi':'');
      return `<tr class="${act}" style="background:${col.bg}" onclick="qbCatClick('${jsq(c)}')" ondblclick="qbCatDbl('${jsq(c)}')"><td><span class="qbcat-cell"><span class="qbcat-dot" style="background:${col.dot}"></span>${c}</span></td><td class="num">${money(tot[c])}</td></tr>`;
    }).join('')+
    `</tbody></table></div>`;
  // ledger rows: default order = category then sub (canonical); a column-header click overrides it.
  let ledger = qbSort.col ? qbSortRows(rows) : qbSortByCatSub(rows);
  if(qbView.filter) ledger = ledger.filter(r=>r.Category===qbView.filter);
  const filterBar = qbView.filter
    ? `<div class="qb-filterbar">Showing only <b>${qbView.filter}</b><span class="pill" onclick="qbClearView()">show all ✕</span></div>` : '';
  let html=uploadCard('qb') + docChip('qb') + `<div class="warn">QuickBooks export ledger. Every line carries the same dropdowns — change Category/Sub/Amount here if a mapping isn't 100%, and it stays consistent with the closing tabs. Uploading a new statement overwrites the auto lines below; manual entries are kept. Download writes all four tabs to one .xlsx.</div>${totalsHtml}
   <div class="section"><h2>Ledger <span class="pill">${ledger.length} lines</span></h2>${filterBar}
   <table><thead><tr>${['Date','Memo','Source','Conf','Category','Sub','Amount'].map(c=>`<th class="sortable${c==='Amount'?' num':''}" onclick="sortQb('${c}')">${c}${qbSort.col===c?(qbSort.dir>0?' ▲':' ▼'):''}</th>`).join('')}</tr></thead><tbody>`;
  ledger.forEach(r=>{
    const bad=redImp[qbRowKey(r)];
    const col=qbCatColor(r.Category);
    const hi = qbView.hi && r.Category===qbView.hi;
    const cls = ((bad?'qb-bad':'') + (hi?' qb-hi':'')).trim();
    const st = (!bad && !hi) ? ` style="background:${col.bg}"` : '';
    const trHead = `<tr class="${cls}"${st}${bad?` title="${esc(bad)}"`:''}>`;
    if(r.isIA){   // computed IA roll-up — read-only here, edited on the IA tab
      html+=`${trHead}<td></td><td>${r.Memo}</td>
        <td><span class="pill">${r.source}</span></td>
        <td><span class="muted">computed</span></td>
        <td>${r.Category}</td><td>${r.Sub}</td>
        <td class="num">${money(r.Amount)}</td></tr>`;
      return;
    }
    const k=r.side+':'+r.idx;
    const catCh = r.isAdd ? `setAddition('${r.side}',${r.idx},'category',this.value)`
                          : `setOV('${k}','category',this.value);setOV('${k}','sub',firstSub(this.value));render('qb')`;
    const subCh = r.isAdd ? `setAddition('${r.side}',${r.idx},'sub',this.value)`
                          : `setOV('${k}','sub',this.value);render('qb')`;
    const amtCh = r.isAdd ? `setAddition('${r.side}',${r.idx},'${r.amtField}',Math.abs(+this.value||0))`
                          : `setOV('${k}','amount',this.value);render('qb')`;
    const conf = r.isAdd ? '<span class="muted">manual</span>' : badge(r.conf);
    html+=`${trHead}<td>${r.Date}</td><td>${r.Memo}${r.isAdd?' <span class="pill">addition</span>':''}</td>
      <td><span class="pill">${r.source}</span></td>
      <td>${conf}</td>
      <td><select onchange="${catCh}">${catOptions(r.Category,r.side)}</select></td>
      <td><select onchange="${subCh}">${subOptions(r.Category,r.Sub)}</select></td>
      <td class="num"><input class="num" value="${r.Amount}" onchange="${amtCh}"></td></tr>`;
  });
  html+=`</tbody></table></div>`;
  // manual QB-only entries: add new lines, reconcile against the imported ledger
  const reconPill = man.length ? ` <span class="pill">${matched} matched · ${unmatched} unmatched</span>` : '';
  html+=`<div class="section"><h2>Add to QB <span class="pill">manual entries</span>${reconPill}</h2>
    <div class="help">Lines you key here are saved to QB only and survive re-imports. Anything that doesn't match an imported line (same Category, Sub &amp; Amount) turns <b style="color:var(--red)">red</b> here and in the ledger above — update one side to reconcile.</div>
    <table><thead><tr><th>Memo</th><th>Source</th><th>Category</th><th>Sub</th><th class="num">Amount</th><th></th></tr></thead><tbody>`;
  if(!man.length) html+=`<tr><td class="muted" colspan="6">No manual entries yet.</td></tr>`;
  man.forEach((m,idx)=>{
    const bad=redMan[idx];
    html+=`<tr class="${bad?'qb-bad':''}"${bad?` title="${esc(bad)}"`:''}>
      <td><input value="${esc(m.label||'')}" placeholder="Description" onchange="setQbManual(${idx},'label',this.value)"></td>
      <td><select onchange="setQbManual(${idx},'source',this.value)"><option value="QB"${(m.source||'QB')==='QB'?' selected':''}>QB</option><option value="manual"${m.source==='manual'?' selected':''}>manual</option></select></td>
      <td><select onchange="setQbManual(${idx},'category',this.value)">${catOptions(m.category)}</select></td>
      <td><select onchange="setQbManual(${idx},'sub',this.value)">${subOptions(m.category,m.sub)}</select></td>
      <td class="num"><input class="num" value="${m.amount==null?'':m.amount}" placeholder="0" onchange="setQbManual(${idx},'amount',this.value)"></td>
      <td><a class="delx" title="Remove entry" onclick="delQbManual(${idx})">✕</a></td></tr>`;
  });
  html+=`</tbody></table><button class="btn2" onclick="addQbManual()">＋ Add line</button></div>`;
  $('#panel').innerHTML=html;
}

/* ---------- xlsx export (all 4 tabs) ---------- */
function exportXlsx(){
  const wb=XLSX.utils.book_new();
  // IA
  const ia=D.ia.inputs;
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
    ['Investment Analysis','',], ['Status',D.deal.status],
    ...Object.entries(ia).map(([k,v])=>[k,v])
  ]), 'IA');
  // closings
  ['buySide','sellSide'].forEach((side,n)=>{
    const aoa=[['Line','Amount','Category','Sub','Confidence','Why']];
    D[side].lines.forEach((l,i)=>{const s=lineState(side,i);aoa.push([s.label,s.amount,s.category,s.sub,s.confidence+'%',s.why]);});
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(aoa), n? 'Sell-Side':'Buy-Side');
  });
  // QB
  const rows=qbRows();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
    rows.map(r=>({Type:r.Type,Date:r.Date,Name:r.Name,Memo:r.Memo,Source:r.source,
                  Confidence:(r.conf==null?'manual':r.conf+'%'),Category:r.Category,Sub:r.Sub,Amount:r.Amount}))
  ), 'QB Export');
  XLSX.writeFile(wb, '15620-ramona-closing.xlsx');
}

/* ---------- AI assistant + timestamped notes log ----------
   The AI answers questions and runs calculations; it never edits the form.
   The user reviews an answer or writes a note, then posts it to the log below
   where every entry is kept with a timestamp. Log lives in OV._log (localStorage). */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function stamp(ts){ return new Date(ts).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
function renderLog(){
  const log=OV._log||[];
  if(!log.length) return '<div class="ai-empty">No posts yet — write a note or ask the AI, then post it here. Each post is timestamped.</div>';
  return log.map(e=>`<div class="ai-entry"><div class="ai-meta">${e.kind==='ai'?'🤖 AI':'📝 Note'} <span>${stamp(e.ts)}</span><a class="ai-del" title="Delete this post" onclick="delLog(${Number(e.ts)||0})">✕</a></div><div class="ai-text">${esc(e.text)}</div></div>`).join('');
}
function refreshLog(){ const el=$('#aiLog'); if(el) el.innerHTML=renderLog(); }
function postLog(text,kind){ const t=(text||'').trim(); if(!t) return; OV._log=OV._log||[]; OV._log.unshift({ts:Date.now(),text:t,kind:kind||'note'}); saveOV(); refreshLog(); }
function delLog(ts){ OV._log=(OV._log||[]).filter(e=>e.ts!==ts); saveOV(); refreshLog(); }
function postNote(){ const el=$('#aiInput'); if(!el||!el.value.trim()){ alert('Write a note first.'); return; } postLog(el.value,'note'); el.value=''; }

// transient AI answer awaiting the user's decision to post
let _draft=null;
function showDraft(text,kind){
  _draft={text,kind};
  const d=$('#aiDraft'); if(!d) return;
  d.innerHTML=`<div class="ai-draftlab">AI answer — review, then post or dismiss</div><div class="ai-text">${esc(text)}</div>`+
    `<div class="ai-actions"><button class="btn2" onclick="postDraft()">＋ Post to log</button><button class="btn2 ghost2" onclick="clearDraft()">Dismiss</button></div>`;
  d.style.display='block';
}
function postDraft(){ if(_draft){ postLog(_draft.text,_draft.kind||'ai'); _draft=null; clearDraft(); } }
function clearDraft(){ _draft=null; const d=$('#aiDraft'); if(d){ d.style.display='none'; d.innerHTML=''; } }

async function askAI(){
  const el=$('#aiInput'); const q=(el?.value||'').trim();
  if(!q){ alert('Type a question or note first.'); return; }
  const btn=$('#askBtn'); const label=btn?btn.textContent:'';
  if(btn){ btn.disabled=true; btn.textContent='Thinking…'; }
  try{
    const res=await fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({deal:D.deal,ia:effIA(),qb:qbRows(),question:q})});
    if(!res.ok) throw new Error('no server');
    const j=await res.json(); showDraft(j.answer||JSON.stringify(j),'ai');
  }catch(e){
    alert('Ask AI needs the backend running (server/index.js) with ANTHROPIC_API_KEY set.');
  }finally{
    if(btn){ btn.disabled=false; btn.textContent=label; }
  }
}

// Auto-detect every mismatch, then have the AI diagnose each + scan for more.
async function findDiscrepancies(){
  const btn=$('#discBtn'); const label=btn?btn.textContent:'';
  if(btn){ btn.disabled=true; btn.textContent='Scanning…'; }
  try{
    const r=computeIA(effIA()); const issues=[];
    // 1) escrow: IA "cash out of escrow" vs sell-side statement net proceeds
    let sd=0, sc=0; ((D.sellSide&&D.sellSide.lines)||[]).forEach((l,idx)=>{const s=lineState('sellSide',idx); sd+=(+s.debit||0); sc+=(+s.credit||0);});
    const stmtNet=sc-sd, cd=stmtNet-r.cashOutEscrow;
    if(Math.abs(cd)>=1) issues.push(`Escrow off by ${money(cd)} — statement net proceeds ${money(stmtNet)} vs IA cash-out ${money(r.cashOutEscrow)}.`);
    // 2) QB manual vs imported ledger
    try{ const rec=qbRecon(); Object.values(rec.redMan||{}).forEach(m=>issues.push('QB: '+m)); }catch(e){}
    // 3) unmapped / low-confidence closing lines
    ['buySide','sellSide'].forEach(side=>{((D[side]&&D[side].lines)||[]).forEach((l,idx)=>{const s=lineState(side,idx); const tag=side==='buySide'?'Buy':'Sell'; const amt=money(s.debit!=null?s.debit:(s.credit!=null?s.credit:(s.amount||0)));
      if(!s.category||/don.?t ?map/i.test(s.category)) issues.push(`${tag}-side "${s.label}" (${amt}) is unmapped.`);
      else if((s.confidence!=null?s.confidence:100)<80) issues.push(`${tag}-side "${s.label}" mapped ${s.category}/${s.sub} at only ${s.confidence}% confidence.`);});});
    const q = issues.length
      ? `You are a fix-and-flip reconciliation auditor. The app already detected these discrepancies:\n- ${issues.join('\n- ')}\n\nFor EACH: state the most likely cause, the exact line/field to check, and the single change to reconcile it. Then scan the QB ledger and closing lines below for any mis-mapping, double-count, or missing line I did NOT flag. Be specific and concise; do not change anything yourself.`
      : `Audit this deal for discrepancies: scan the QB ledger and closing lines for mis-mappings, double-counts, missing lines, or estimate-vs-actual gaps. The app flags none — confirm, or surface anything subtle.`;
    const res=await fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({deal:D.deal,ia:effIA(),qb:qbRows(),question:q})});
    if(!res.ok) throw new Error('no server');
    const j=await res.json(); showDraft((issues.length?('Detected '+issues.length+' discrepancy(ies). AI diagnosis:\n\n'):'No app-detected discrepancies. ')+(j.answer||JSON.stringify(j)),'ai');
  }catch(e){
    alert('Find discrepancies needs the backend running (server/index.js) with ANTHROPIC_API_KEY set.');
  }finally{ if(btn){ btn.disabled=false; btn.textContent=label; } }
}

async function evaluateDeal(ev){
  const btn=ev&&ev.target?ev.target:null; const label=btn?btn.textContent:'';
  if(btn){ btn.disabled=true; btn.textContent='Evaluating…'; }
  try{
    const res=await fetch('/api/evaluate',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({deal:D.deal,ia:effIA(),qb:qbRows()})});
    if(!res.ok) throw new Error('no server');
    const j=await res.json(); showDraft(j.comment||JSON.stringify(j),'ai');
  }catch(e){
    alert('AI Evaluate needs the backend running (server/index.js) with ANTHROPIC_API_KEY set.\nIn Replit: add the secret, run the server, then this button calls /api/evaluate.');
  }
}
function resetOverrides(){ if(confirm('Clear all your edits and restore the parsed mappings?')){ OV={}; localStorage.removeItem(LS); render('ia'); document.querySelector('.tab').click(); } }

boot();
