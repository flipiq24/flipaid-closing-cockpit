<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FlipAid · Closing Cockpit</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#f3f4f6; --card:#fff; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb;
    --accent:#f97316; --accent-soft:#fff1e6; --green:#16a34a; --amber:#d97706; --red:#dc2626;
    --radius:12px; --fs:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:var(--fs)/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  header.top{display:flex;align-items:center;gap:12px;row-gap:10px;flex-wrap:wrap;padding:16px 28px;background:#fff;border-bottom:1px solid var(--line)}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--accent)}
  .title{font-size:20px;font-weight:700}
  .sub{color:var(--muted);font-size:14px}
  .saved{color:var(--muted);font-size:13px}
  .hdr-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex:1}
  .hdr-addr{font:inherit;font-size:14px;padding:5px 9px;border:1px solid var(--line);border-radius:6px;color:var(--ink);min-width:230px}
  .hdr-addr:focus{outline:none;border-color:var(--accent)}
  .hdr-status{font:inherit;font-size:13px;font-weight:600;padding:6px 10px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink);cursor:pointer}
  .hdr-status:focus{outline:none;border-color:var(--accent)}
  .hdr-actions{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
  .tabsbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding:0 28px;background:#fff;border-bottom:1px solid var(--line)}
  .tabs{display:flex;gap:24px;flex-wrap:wrap}
  .tabsbar .hdr-actions{margin-left:auto;display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .tabsbar .btn{background:none;border:none;color:var(--muted);font-weight:600;font-size:14px;padding:14px 2px;border-radius:0;cursor:pointer}
  .tabsbar .btn:hover{color:var(--accent)}
  .tab{padding:14px 2px;cursor:pointer;color:var(--muted);font-weight:600;border-bottom:2px solid transparent}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab .count{font-size:11px;background:#f3f4f6;border-radius:10px;padding:2px 7px;margin-left:6px;color:var(--muted)}
  .wrap{max-width:1440px;margin:22px auto;padding:0 28px}
  .section{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;margin-bottom:18px}
  .section h2{font-size:16px;margin:0 0 16px;display:flex;align-items:center;gap:10px}
  th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
  th.sortable:hover{color:var(--accent)}
  .pill{font-size:11px;font-weight:600;background:var(--accent-soft);color:var(--accent);border-radius:10px;padding:2px 9px}
  .proc-card{display:flex;align-items:center;gap:14px}
  .proc-t{font-weight:700;font-size:15px}
  .proc-s{color:var(--muted);font-size:13px}
  .spinner{width:22px;height:22px;border:3px solid var(--accent-soft);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;flex:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 28px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:12px;color:var(--muted)}
  .field input,.field select{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:#fff}
  .field input[readonly]{background:#f9fafb;color:var(--muted)}
  .req{color:var(--red)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{color:var(--muted);font-weight:600;font-size:12px}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  td input,td select{width:100%;border:1px solid var(--line);border-radius:6px;padding:6px 7px;font-size:13px}
  td input.num{text-align:right}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;cursor:help}
  .b100{background:#dcfce7;color:#166534}
  .b90{background:#fef9c3;color:#854d0e}
  .b80{background:#ffedd5;color:#9a3412}
  .blo{background:#fee2e2;color:#991b1b}
  .help{border-bottom:1px dotted var(--muted);cursor:help}
  .row-tot td{font-weight:700;border-top:2px solid var(--ink)}
  .kpi{display:flex;gap:18px;flex-wrap:wrap}
  .kpi .box{flex:1;min-width:150px;background:#fafafa;border:1px solid var(--line);border-radius:10px;padding:14px}
  .kpi .box .k{font-size:12px;color:var(--muted)}
  .kpi .box .v{font-size:22px;font-weight:700;margin-top:4px}
  .v.good{color:var(--green)} .v.bad{color:var(--red)}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-weight:600;cursor:pointer;font-size:13px}
  .btn-back{background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-weight:600;cursor:pointer;font-size:13px}
  .btn-back:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
  .btn-back:disabled{opacity:.4;cursor:default}
  .bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
  .warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
  .warn-err{background:#fef2f2;border-color:#fecaca;color:#991b1b}
  .raw-dump{margin-top:6px}
  .raw-dump summary{cursor:pointer;font-weight:600}
  .raw-dump pre{margin:6px 0 0;padding:8px;background:#fff;border:1px solid #fecaca;border-radius:6px;max-height:240px;overflow:auto;white-space:pre-wrap;word-break:break-word;font-size:12px}
  .statusrow{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .statusrow select{padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-weight:600}
  .note{font-size:12px;color:var(--muted);margin-top:8px}
  .hidden{display:none}
  .help{cursor:help}
  /* ===== card-UI IA (MoM Connect look) ===== */
  .count{font-size:11px;font-weight:700;background:var(--accent-soft);color:var(--accent);border-radius:10px;padding:2px 9px;margin-left:8px}
  .field.full{grid-column:1 / -1}
  .field textarea{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font:inherit;min-height:62px;resize:vertical;background:#fff}
  .adorn{display:flex;align-items:center;border:1px solid var(--line);border-radius:8px;background:#fff;overflow:hidden}
  .adorn:focus-within{border-color:var(--accent)}
  .adorn .pre,.adorn .suf{padding:0 9px;color:var(--muted);font-size:13px;white-space:nowrap}
  .adorn input{border:none;border-radius:0;flex:1;min-width:0;padding:9px 8px;font:inherit}
  .adorn input:focus{outline:none}
  .field input.ro{background:#f3f4f6;color:#374151;font-weight:600;border-color:#e5e7eb}
  .autotag{color:var(--muted);font-weight:400;font-size:11px}
  /* ===== compact ledger IA (mirrors the reference spreadsheet) ===== */
  .ia-sheet{background:#fff;border:1px solid #c9c9c9;border-radius:8px;max-width:1120px;margin:0 auto;overflow:hidden;font-variant-numeric:tabular-nums;color:#111}
  .ia-header{position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid #d8dee8;box-shadow:0 2px 6px rgba(0,0,0,.07)}
  .hdr-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-left:auto}
  .hdr-ctl{display:flex;align-items:center;gap:5px}
  .hdr-ctl label{color:var(--muted);font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.03em}
  .hdr-ctl select{font:inherit;font-size:13px;font-weight:600;padding:6px 10px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink);cursor:pointer}
  .hdr-ctl select:focus{outline:none;border-color:var(--accent)}
  .sumband{margin-bottom:14px}
  .ia-sum{display:flex;flex-wrap:wrap;gap:8px;padding:9px 16px;background:#f7f9fc;border:1px solid #e6eaf0;border-radius:8px}
  .ia-sum .su{flex:1;min-width:150px;text-align:center;padding:4px 10px;border-right:1px solid #e6eaf0}
  .ia-sum .su:last-child{border-right:none}
  .ia-sum .su b{display:block;font-size:15px;color:#111;font-variant-numeric:tabular-nums}
  .ia-sum .su span{display:block;font-size:11px;color:#6b7280}
  .ia-sum .su em{display:block;font-style:normal;font-size:10px;color:#9aa3b2;text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
  .ia-sum .su.tot{background:#eef2f7;border-radius:6px;border-right:none}
  .ia-sum .su.tot b{font-size:17px;color:#111}
  .ia-sum .su.tot em{color:#5b6472;font-weight:700}
  .add2nd{font-size:10px;margin-left:8px;text-transform:none;letter-spacing:0;vertical-align:middle}
  .rm2{cursor:pointer;color:#c00000;font-size:10px;font-weight:600;margin-left:8px;text-transform:none;letter-spacing:0}
  .rm2:hover{text-decoration:underline}
  .band{background:#808080;color:#fff;text-align:center;font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:3px}
  .subband{text-align:center;font-weight:700;font-size:11.5px;padding:4px 0 0}
  .cols{display:flex;gap:28px;padding:5px 16px}
  .cols .col{flex:1;min-width:0}
  .cols .col.r{flex:1.1}
  .lr{display:grid;grid-template-columns:52px 100px 1fr;align-items:center;gap:7px;padding:1.5px 0}
  .lr .lp{text-align:right;color:#666;font-size:11px}
  .lr .ll{font-size:12px}
  .lr .av{text-align:right;font-weight:700;padding-right:4px}
  .lr input.m{width:100%;border:1px solid #d6d6d6;background:#fbfbfb;text-align:right;padding:2px 5px;font:inherit;font-variant-numeric:tabular-nums}
  .lr input.m:focus{background:#fff;border-color:var(--accent);outline:none}
  .lr.tot{border-top:2px solid #000;font-weight:700;margin-top:3px;padding-top:3px}
  .lr.tot .ll{font-weight:700}
  .lr.big .av,.lr.big .lp{font-size:15px}
  .pr{display:grid;grid-template-columns:100px 1fr;align-items:center;gap:9px;padding:1.5px 0}
  .pr.dt{grid-template-columns:140px 1fr}
  .pr input{width:100%;border:1px solid #d6d6d6;background:#ededed;text-align:center;padding:2px 5px;font:inherit}
  .pr input:focus{background:#fff;border-color:var(--accent);outline:none}
  .pr .pl{font-size:12px}
  .pr.d .dv{text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
  .pr .pl.u{color:#1f3864;text-decoration:underline}
  .lbox{border:2px solid #000;text-align:center;padding:4px 8px;margin:2px 0 6px}
  .lbox .t{font-weight:700;font-size:11px}
  .lbox input{border:none;text-align:center;font-weight:700;font-size:14px;width:100%;background:transparent}
  .lbox input:focus{outline:none}
  .dates{width:fit-content;margin-left:auto}
  .col.r.purchcol{display:flex;flex-direction:column}
  .col.r.purchcol .summary{margin-top:auto;margin-bottom:auto}
  .col.purchleft{display:flex;flex-direction:column}
  .col.purchleft .lr.tot{margin-top:auto}
  .col.grossleft{display:flex;flex-direction:column}
  .col.grossleft .lr.tot{margin-top:auto}
  .col.r.grosscol{display:flex;flex-direction:column;justify-content:flex-end}  /* whole breakdown sits at the bottom, total aligns with Gross Profit to Seller */
  .summary{margin-top:8px;padding:0 16px 8px}
  .summary .s{display:grid;grid-template-columns:1fr 96px;align-items:center;gap:8px;font-weight:700;padding:1px 0;font-size:12px;position:relative}
  .summary .s .delx{position:absolute;right:-13px;top:50%;transform:translateY(-50%)}
  .summary .s>*:nth-child(1){text-align:right}
  .summary .s>*:nth-child(2){text-align:right}
  .summary .s .lab{color:#c00000}
  .summary .s.tot{display:flex;align-items:flex-end;gap:10px;border-top:1px solid var(--line);margin-top:3px;padding-top:4px;color:#c00000}
  .summary .s.tot .lab{flex:1;text-align:right}
  .summary .s.tot .tval{font-weight:700;white-space:nowrap}
  .summary .s.tot .totadd{white-space:nowrap}
  .summary .s.addrow2{display:block;text-align:right;padding-top:2px}
  .summary .s input.clab2{text-align:left;border:1px dashed #cfcfcf;background:#fff;padding:1px 4px;font:inherit;font-size:12px;width:100%}
  .summary .s input.clab2:focus{border-color:var(--accent);border-style:solid;outline:none}
  .summary .s .sum-in{width:100%;text-align:right;font:inherit;font-weight:700;font-size:12px;border:1px solid var(--line);border-radius:5px;padding:2px 6px;color:var(--ink)}
  .summary .s .sum-in:focus{outline:none;border-color:var(--accent)}
  .ai-wrap{padding:8px 16px}
  .ia-notes{width:100%;min-height:60px;border:1px solid var(--line);border-radius:6px;padding:6px 8px;font:inherit;resize:vertical}
  .ai-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin-top:6px}
  .btn2{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 11px;font:inherit;font-size:12px;font-weight:600;cursor:pointer}
  .btn2.ghost2{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn2:hover{filter:brightness(.96)}
  .btn2:disabled{opacity:.6;cursor:default}
  .ai-draft{display:none;margin-top:8px;border:1px solid #cfe0f6;background:#f5f9ff;border-radius:6px;padding:8px 10px}
  .ai-draftlab{font-size:10.5px;font-weight:700;color:#3a5aa8;margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
  .ai-text{font-size:12.5px;white-space:pre-wrap;line-height:1.5;color:#1f2937}
  .ai-log{margin-top:12px;display:flex;flex-direction:column;gap:8px;max-height:340px;overflow:auto}
  .ai-empty{font-size:12px;color:var(--muted);font-style:italic}
  .ai-entry{border:1px solid var(--line);border-radius:6px;padding:7px 9px;background:#fff}
  .ai-meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-bottom:3px}
  .ai-meta .ai-del{margin-left:auto;color:#c00000;cursor:pointer;font-weight:700}
  .ai-meta .ai-del:hover{text-decoration:underline}
  .lr .lp{cursor:default}
  .lr input.m+.ll[title],.lr .ll[title]{cursor:help}
  .lr .lp[ondblclick]{cursor:pointer}
  .lr .lp[ondblclick]:hover{color:var(--accent);text-decoration:underline}
  input.pe{width:54px;border:1px solid var(--accent);text-align:right;padding:1px 3px;font:inherit;font-size:11px;outline:none}
  .pcfac{cursor:pointer}
  .pcfac:hover{color:var(--accent)}
  .srclink{cursor:pointer;color:#1f3864;margin-left:4px;text-decoration:none;font-weight:700}
  .srclink:hover{text-decoration:underline}
  .addrow{padding:1px 0 4px}
  .addcost{cursor:pointer;color:var(--accent);font-size:11px;font-weight:600}
  .addcost:hover{text-decoration:underline}
  .lr .clab{border:1px dashed #cfcfcf;background:#fff;padding:1px 4px;font:inherit;font-size:12px;width:62%}
  .lr .clab:focus{border-color:var(--accent);border-style:solid;outline:none}
  .delx{cursor:pointer;color:#c00000;margin-left:6px;font-size:11px;font-weight:700}
  .lr.roi .av{font-weight:400;color:inherit}
  .lr.roi .lp{font-weight:400}
  tr.flash{background:#fff3bf;transition:background .4s}
  tr.hilite, tr.hilite td{background:#fff3bf}   /* persistent source highlight (stays until you jump elsewhere) */
  .escrow-recon{border:1.5px dashed #4472c4;border-radius:6px;padding:10px 14px;margin:6px 0 0 auto;max-width:340px}
  .escrow-recon .er{display:flex;justify-content:space-between;gap:18px;font-size:13px;padding:2px 0}
  .escrow-recon .erl{color:#374151}
  .escrow-recon .erv{font-weight:700;text-align:right;white-space:nowrap}
  .escrow-recon .erd{border-top:1px solid #ccc;margin-top:4px;padding-top:5px}
  tr.qb-bad>td{background:#fef2f2;color:#991b1b}
  tr.qb-bad>td:first-child{box-shadow:inset 3px 0 0 var(--red)}
  .qbtot tr{cursor:pointer}
  .qbtot td{padding:5px 10px}
  .qbcat-cell{display:inline-flex;align-items:center;gap:8px}
  .qbcat-dot{width:11px;height:11px;border-radius:3px;display:inline-block;flex:none}
  .qbtot tr.qb-tot-hi{outline:2px solid #f59e0b;outline-offset:-2px}
  .qbtot tr.qb-tot-filter{outline:2px solid #0f172a;outline-offset:-2px;font-weight:700}
  tr.qb-hi>td{background:#fde68a !important}
  .qb-filterbar{font-size:12.5px;margin:8px 0 4px;color:#334155}
  .qb-filterbar .pill{cursor:pointer;background:#e2e8f0;margin-left:6px}
  /* ===== closing-statement layout (Buy/Sell tabs) ===== */
  .stmt-hd{display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px}
  .stmt-co{font-size:12px;color:var(--muted);font-weight:600}
  .stmt-ttl{font-size:18px;font-weight:800;margin-top:2px}
  .stmt-badge{font-size:11px;font-weight:700;border-radius:10px;padding:2px 9px;margin-left:8px;vertical-align:middle}
  .stmt-badge.fin{background:#dcfce7;color:#166534}
  .stmt-badge.est{background:#fef9c3;color:#854d0e}
  .stmt-meta{display:grid;grid-template-columns:repeat(2,auto);gap:4px 22px;font-size:12.5px;text-align:right}
  .stmt-meta div span{color:var(--muted);margin-right:8px}
  h2.stmt-sec{font-size:13px;letter-spacing:.02em;text-transform:uppercase;color:#1f3864;border-bottom:2px solid #e5e7eb;padding-bottom:6px}
  table.stmt{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
  table.stmt col.c-num{width:118px}
  table.stmt col.c-cat{width:190px}
  table.stmt col.c-cf{width:64px}
  table.stmt td.desc{overflow-wrap:anywhere}
  table.stmt th{color:var(--muted);font-weight:600;font-size:11.5px;text-align:left;padding:6px 8px;border-bottom:1px solid var(--line)}
  table.stmt th.num,table.stmt td.num{text-align:right;font-variant-numeric:tabular-nums;width:118px}
  table.stmt th.cf,table.stmt td.cf{width:64px;text-align:center}
  table.stmt td{padding:5px 8px;border-bottom:1px solid #f1f1f3;vertical-align:middle}
  table.stmt td.desc{max-width:560px}
  table.stmt td.num input{width:104px;text-align:right;border:1px solid var(--line);border-radius:6px;padding:5px 6px;font:inherit}
  table.stmt td.num input:focus{border-color:var(--accent);outline:none}
  table.stmt select{width:100%;border:1px solid var(--line);border-radius:6px;padding:5px 6px;font:inherit;background:#fff}
  table.stmt .dash{color:#cbd0d6}
  /* Debit / Credit "lanes" — tinted columns so the eye tracks money-out vs money-in */
  table.stmt th.deb,table.stmt td.deb{background:#fdf3ef;border-left:1px solid #efddd2}
  table.stmt th.cred,table.stmt td.cred{background:#eef7f1;border-right:1px solid #d8ebdf}
  table.stmt th.deb{color:#9a4a28}
  table.stmt th.cred{color:#166534}
  table.stmt td.deb b{color:#9a4a28}
  table.stmt td.cred b{color:#166534}
  table.stmt.stmt-total td{border-top:2px solid var(--ink);border-bottom:none;padding-top:10px;font-size:14px}
  table.stmt.stmt-total td.deb,table.stmt.stmt-total td.cred{border-top:2px solid var(--ink)}
  .bal-ok{color:var(--green);font-weight:700}
  .bal-bad{color:var(--red);font-weight:700}
  .bal-net{color:#1f3864;font-weight:700}
  .bal-hint{color:var(--muted);font-weight:400;font-size:11px}
  /* statement ingest dropzone */
  .upl{border:1.5px dashed #c7ccd3;border-radius:12px;background:#fafbfc;padding:14px 16px;margin-bottom:14px;transition:border-color .15s,background .15s}
  .upl.drag{border-color:var(--accent);background:#fff7f0}
  .upl-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .upl-ico{width:36px;height:36px;border-radius:9px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700}
  .upl-txt{flex:1;min-width:200px}
  .upl-t{font-weight:700;font-size:14px}
  .upl-s{font-size:12.5px;color:var(--muted);margin-top:2px}
  .upl-browse{color:var(--accent);font-weight:600;cursor:pointer;text-decoration:underline}
  .upl-browse input{display:none}

  .doc-chip{display:inline-flex;align-items:center;gap:7px;margin-top:7px;font-size:12.5px;background:var(--accent-soft);border:1px solid #f0d9c7;border-radius:8px;padding:5px 11px}
  .doc-chip .ok{color:var(--green);font-weight:600}

  .add-desc{width:100%;border:1px dashed #cfcfcf;background:#fff;padding:2px 6px;font:inherit;font-size:13px;border-radius:5px}
  .add-desc:focus{border-color:var(--accent);border-style:solid;outline:none}
  .modal-ov{position:fixed;inset:0;background:rgba(20,22,26,.45);display:flex;align-items:center;justify-content:center;z-index:50}
  .modal{position:relative;background:#fff;border-radius:14px;padding:22px 24px;max-width:420px;width:90%;box-shadow:0 18px 50px rgba(0,0,0,.25)}
  .modal h3{margin:0 0 8px;font-size:16px}
  .modal p{margin:0 0 16px;font-size:13px;color:var(--muted);line-height:1.5}
  .modal-x{position:absolute;top:12px;right:14px;cursor:pointer;color:var(--muted);font-weight:700;text-decoration:none}
  .modal-acts{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .btn-pri{background:var(--accent);color:#fff;font-weight:700;font-size:13px;padding:9px 14px;border-radius:8px;cursor:pointer}
  .btn-pri input{display:none}

</style>

<body>
<header class="top">
  <span class="dot"></span>
  <div class="hdr-meta">
    <button class="btn-back" id="backBtn" onclick="undoInput()" title="Undo your last change" disabled>← Back</button>
    <span class="title">Investment Analysis</span>
    <input class="hdr-addr" id="dealAddr" placeholder="Property address" onchange="setIA('address',this.value)">
    <span class="hdr-controls" id="hdrControls"></span>
  </div>
</header>

<div id="sumband" class="sumband"></div>

<div class="tabsbar">
  <div class="tabs" id="tabs"></div>
  <div class="hdr-actions">
    <button class="btn" onclick="exportXlsx()">⬇ Download .xlsx (4 tabs)</button>
    <button class="btn" onclick="resetOverrides()">↺ Reset overrides</button>
  </div>
</div>

<div class="wrap">
  <div id="panel"></div>
</div>

<script>
let D=null, OV={};            // OV = user overrides keyed by line id
const $=s=>document.querySelector(s);
const money=n=> (n==null||n==='')?'—':'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const LS='flipaid-ramona-overrides';
const LS_HIST='flipaid-ramona-history';   // undo stack of prior OV snapshots (survives reloads)

/* ---------- CA TAX MATH (single source of truth) ---------- */
function transferTax(price, ratePer1000){ return +(price * ratePer1000/1000).toFixed(2); }
function countyProration(semiAnnual, days){ return +(semiAnnual/180*days).toFixed(2); } // 30/360
function supplemental(purchase, priorAssessed, annualRatePct, monthsFactor){
  const base = purchase - (priorAssessed==null? purchase*0.60 : priorAssessed);
  return +(base * (annualRatePct/100) * monthsFactor).toFixed(2);
}

/* ---------- load ---------- */
async function boot(){
  D = await (await fetch('./data/ramona.json')).json();
  try{ OV = JSON.parse(localStorage.getItem(LS)||'{}'); }catch(e){ OV={}; }
  // One-time wipe of Buy-Side, Sell-Side and QB Accounting data (user requested clearing these tabs).
  // Guarded by a flag so future uploads/additions/manual entries are NOT wiped on every reload.
  if(!OV._wipeClosingV1){
    delete OV._data_buySide; delete OV._data_sellSide; delete OV._data_qb;
    if(OV._src){ delete OV._src.buySide; delete OV._src.sellSide; delete OV._src.qb; }
    if(OV._add){ delete OV._add.buySide; delete OV._add.sellSide; }
    delete OV._qbManual;
    OV._wipeClosingV1 = true;
    localStorage.setItem(LS, JSON.stringify(OV));
  }
  migrateTaxonomyNames();                          // bring any stored data onto the renamed categories
  if(OV._status){ D.deal.status=OV._status; }
  if(OV._ia){ Object.assign(D.ia.inputs, OV._ia); }
  // QB Accounting is a derived ledger by default; an uploaded QB doc parses into D.qb.lines.
  D.qb = D.qb || {lines:[], role:'QB', title:'QuickBooks Accounting', status:'', date:''};
  // restore any parsed statement lines from a prior attach
  ['buySide','sellSide','qb'].forEach(sd=>{ const dd=OV['_data_'+sd]; if(dd&&Array.isArray(dd.lines)&&dd.lines.length){ D[sd].lines=dd.lines; if(dd.meta) Object.assign(D[sd], dd.meta); } });
  // No closing data -> deal is estimate-only: pin Mode to "Estimated" once here (controlled, not in render).
  if(!hasClosingData() && D.ia.inputs.mode!=='Estimated'){ D.ia.inputs.mode='Estimated'; OV._ia=D.ia.inputs; localStorage.setItem(LS, JSON.stringify(OV)); }
  renderHeaderMeta();
  renderTabs(); bindTabs(); render('ia'); updateBackBtn();
}
function renderHeaderMeta(){
  $('#dealAddr').value = (D.ia.inputs.address==null?'':D.ia.inputs.address);
}
function setStatus(val){
  D.deal.status=val; OV._status=val; saveOV();
  const a=document.querySelector('.tab.active'); if(a) render(a.dataset.tab);
}
// Tab row is data-driven: add/remove/reorder tabs by editing this one array.
const TABS=[
  {key:'ia',   label:'Investment Analysis'},
  {key:'buy',  label:'Buy-Side Closing'},
  {key:'sell', label:'Sell-Side Closing'},
  {key:'qb',   label:'QB Accounting'},
];
function renderTabs(){
  $('#tabs').innerHTML = TABS.map((t,n)=>`<div class="tab${n===0?' active':''}" data-tab="${t.key}">${t.label}</div>`).join('');
}
function bindTabs(){
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active'); render(t.dataset.tab);
  });
}
function migrateTaxonomyNames(){
  // Category rename (string-only, no math): keep any previously-stored parsed lines,
  // overrides, manual entries and additions in lockstep with the renamed taxonomy.
  const REN={'Gross Profits':'Sales Cost','Total Purchase Cost':'Purchase Cost'};
  let changed=false; const fix=c=>{ if(REN[c]){ changed=true; return REN[c]; } return c; };
  Object.keys(OV||{}).forEach(k=>{ const o=OV[k]; if(o && typeof o==='object' && !Array.isArray(o) && REN[o.category]) o.category=fix(o.category); });
  ['buySide','sellSide','qb'].forEach(sd=>{ const dd=OV['_data_'+sd]; if(dd&&Array.isArray(dd.lines)) dd.lines.forEach(l=>{ if(l&&l.map&&REN[l.map.category]) l.map.category=fix(l.map.category); }); });
  if(Array.isArray(OV._qbManual)) OV._qbManual.forEach(m=>{ if(m&&REN[m.category]) m.category=fix(m.category); });
  if(OV._add) ['buySide','sellSide'].forEach(sd=>{ if(Array.isArray(OV._add[sd])) OV._add[sd].forEach(a=>{ if(a&&REN[a.category]) a.category=fix(a.category); }); });
  if(changed){ try{ localStorage.setItem(LS, JSON.stringify(OV)); }catch(e){} }
}
function saveOV(){
  // push the currently-persisted state onto the undo stack BEFORE overwriting it.
  // Seed a synthetic '{}' when nothing is stored yet, so the very first edit stays undoable.
  try{ const prev=localStorage.getItem(LS);
    let h=[]; try{h=JSON.parse(localStorage.getItem(LS_HIST)||'[]');}catch(e){}
    h.push(prev!=null?prev:'{}'); if(h.length>200) h.shift(); localStorage.setItem(LS_HIST, JSON.stringify(h));
  }catch(e){}
  localStorage.setItem(LS, JSON.stringify(OV)); flashSaved(); updateBackBtn();
}
// "← Back": revert the last input by restoring the previous saved state, then rebuild from boot.
function undoInput(){
  let h=[]; try{h=JSON.parse(localStorage.getItem(LS_HIST)||'[]');}catch(e){}
  if(!h.length) return;
  const prev=h.pop(); localStorage.setItem(LS_HIST, JSON.stringify(h));
  localStorage.setItem(LS, prev); location.reload();
}
function updateBackBtn(){ const b=document.getElementById('backBtn'); if(!b) return;
  let h=[]; try{h=JSON.parse(localStorage.getItem(LS_HIST)||'[]');}catch(e){} b.disabled=!h.length; }
function flashSaved(){ const s=$('#saved'); if(s) s.textContent='✓ Saved '+new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }

/* ---------- helpers for line state (override-aware) ---------- */
function lineState(side, idx){
  const k = side+':'+idx; const base = (D[side] && D[side].lines && D[side].lines[idx]) || {};
  const map = base.map || {};                       // parsed lines (esp. QB) may omit map/why/confidence — never assume
  const o = OV[k]||{};
  const debit  = o.debit!==undefined  ? o.debit  : (base.debit!==undefined  ? base.debit  : null);
  const credit = o.credit!==undefined ? o.credit : (base.credit!==undefined ? base.credit : null);
  // signed amount for QB/IA: debit positive, credit negative; falls back to legacy `amount`
  const amount = debit!=null ? debit : (credit!=null ? -credit : (o.amount!==undefined ? o.amount : (base.amount!==undefined?base.amount:null)));
  return {
    debit, credit, amount,
    category: o.category || map.category || '',
    sub: o.sub || map.sub || '',
    confidence: base.confidence, why: base.why, label: base.label, section: base.section,
    overridden: !!Object.keys(o).length
  };
}
function setOV(k,field,val){ OV[k]=OV[k]||{}; if(field==='amount'||field==='debit'||field==='credit') val=val===''?null:+val; OV[k][field]=val; saveOV(); }

function badge(c){
  const cls = c>=100?'b100':c>=90?'b90':c>=80?'b80':'blo';
  return `<span class="badge ${cls}">${c}%</span>`;
}
// taxCats() = the dropdown taxonomy, with "Purchase Cost" mirrored 1:1 to the IA
// Purchase Cost section — including any custom "+ add cost" lines — so the
// Buy/Sell/QB mapping dropdowns stay 100% aligned with the form.
function taxCats(){
  const cats={};
  for(const k in D.taxonomy.categories) cats[k]=D.taxonomy.categories[k].slice();
  if(cats['Purchase Cost']){
    const custom=((D.ia&&D.ia.inputs&&D.ia.inputs.customLines&&D.ia.inputs.customLines.purchase)||[])
      .map(l=>l&&l.label).filter(Boolean);
    cats['Purchase Cost']=cats['Purchase Cost'].concat(custom);
  }
  return cats;
}
function firstSub(cat){ const a=taxCats()[cat]; return (a&&a[0])||''; }
// catList(side): the Category names allowed in a given closing tab. buy = Purchase + Loans;
// sell = Loans + Sales Cost. No side (QB) = every Category. The current value is always
// kept in the list so an existing mapping never silently disappears.
function catList(side,sel){
  let list = (side && D.taxonomy.sides && D.taxonomy.sides[side]) ? D.taxonomy.sides[side].slice() : Object.keys(taxCats());
  if(sel && !list.includes(sel)) list=[sel].concat(list);
  return list;
}
function catOptions(sel,side){
  return catList(side,sel).map(c=>`<option ${c===sel?'selected':''}>${c}</option>`).join('');
}
function subOptions(cat,sel){
  return (taxCats()[cat]||[]).map(s=>`<option ${s===sel?'selected':''}>${s}</option>`).join('');
}
// "Don't Map" dropdowns: show EVERY category / sub (not side-filtered), with an explicit
// "Don't Map" choice (value="") as the default. Used by the auto-calculated resale tax block.
function dontMapCat(sel){
  return `<option value="" ${sel?'':'selected'}>— Don't Map —</option>`
    + Object.keys(taxCats()).map(c=>`<option ${c===sel?'selected':''}>${c}</option>`).join('');
}
function dontMapSub(cat,sel){
  return `<option value="" ${sel?'':'selected'}>— Don't Map —</option>`
    + (taxCats()[cat]||[]).map(s=>`<option ${s===sel?'selected':''}>${s}</option>`).join('');
}

// True when at least one closing statement has line data (buy or sell side).
function hasClosingData(){
  return !!((D.buySide&&D.buySide.lines&&D.buySide.lines.length) || (D.sellSide&&D.sellSide.lines&&D.sellSide.lines.length));
}

/* ---------- RENDER ---------- */
// Global summary band — shown above the panel on EVERY tab. Data-driven: add/remove/
// reorder by editing this array. isTotal emphasizes the sum card.
function renderSumBand(){
  const el=$('#sumband'); if(!el) return;
  const i=effIA(), r=computeIA(i);
  const opt=(arr,sel)=>(arr||[]).map(o=>`<option ${o===sel?'selected':''}>${o}</option>`).join('');
  const sumCards=[
    {label:'Total Acquisition Cost',     amount:r.totAcq},
    {label:'Financing Costs',            amount:r.hardMoney},
    {label:'Rehab Costs',                amount:r.rehabCost},
    {label:'Miscellaneous Costs',        amount:r.miscLessInterest},
    {label:'Total Development Cost',      amount:r.totalDevCost, isTotal:true},
  ];
  const sumCell=c=>`<div class="su${c.isTotal?' tot':''}"><b>${money(c.amount)}</b><span>${Ppct(c.amount)}</span><em>${c.label}</em></div>`;
  const hc=$('#hdrControls');
  // No closing data -> Mode is locked to "Estimated" (pinned once at boot); render the dropdown disabled.
  const noData = !hasClosingData();
  const modeSel = noData
    ? `<select disabled title="Upload a buy-side or sell-side closing statement before you can set Acquired or Sold">${opt(D.ia.modeOptions,'Estimated')}</select>`
    : `<select onchange="setIA('mode',this.value)">${opt(D.ia.modeOptions,i.mode)}</select>`;
  if(hc) hc.innerHTML=`<span class="hdr-ctl"><label>Mode</label>${modeSel}</span>`+
    `<span class="hdr-ctl"><label>Financing</label><select onchange="setIA('financingType',this.value)">${opt(D.ia.financingOptions,i.financingType)}</select></span>`;
  el.innerHTML=`<div class="ia-header">
  <div class="ia-sum">${sumCards.map(sumCell).join('')}</div>
  </div>`;
}

function render(tab){
  renderSumBand();
  if(tab==='ia') return renderIA();
  if(tab==='qb') return renderQB();
  return renderClosing(tab==='buy'?'buySide':'sellSide', tab);
}

/* ----- statement ingest: file / drag-drop / Google Doc link -> auto-sets Mode ----- */
function srcState(side){ return (OV._src && OV._src[side]) || {}; }
// which IA Mode (H2) an attached statement implies
function modeForSide(side){
  // Mode has exactly three states: Estimated / Acquired / Sold.
  // A buy-side closing means the property is Acquired; a sell-side closing means it's Sold.
  return side==='buySide' ? 'Acquired' : 'Sold';
}
function applyAttach(side, kind, name, url){
  OV._src = OV._src || {}; OV._src[side] = {kind, name, url, parsed:false};
  if(side!=='qb'){                                // a closing statement sets the deal Mode; the QB file does NOT
    const mode = modeForSide(side);
    // Don't downgrade Sold -> Acquired if a buy-side doc is attached after the deal is already Sold.
    if(!(mode==='Acquired' && D.ia.inputs.mode==='Sold')){ D.ia.inputs.mode = mode; OV._ia = D.ia.inputs; }
  }
  saveOV();
  setParsing(side,true);                           // show the "processing" spinner immediately
  tryParse(side);                                  // backend parse fills the lines, then clears the spinner
  render(tabFor(side));                            // stay on the tab you uploaded from (now showing the spinner)
}
function fileStmt(side, inp){ const f=inp.files&&inp.files[0]; if(!f) return; window.__stmtFiles=window.__stmtFiles||{}; window.__stmtFiles[side]=f; applyAttach(side,'file',f.name,''); }
function dropStmt(side, ev){ ev.preventDefault(); ev.currentTarget.classList.remove('drag'); const f=ev.dataTransfer.files&&ev.dataTransfer.files[0]; if(!f) return; window.__stmtFiles=window.__stmtFiles||{}; window.__stmtFiles[side]=f; applyAttach(side,'file',f.name,''); }
function linkStmt(side, url){ url=(url||'').trim(); if(!url) return; applyAttach(side,'link','',url); }
function clearStmt(side){
  if(OV._src&&OV._src[side]) delete OV._src[side];
  if(side==='qb'){                                  // removing the QB doc reverts to the derived ledger
    if(D.qb) D.qb.lines=[]; delete OV._data_qb;
    Object.keys(OV).forEach(k=>{ if(k.indexOf('qb:')===0) delete OV[k]; });
  }
  saveOV(); renderActive();
}
/* ----- "Additions" : user items NOT on the closing statement. Stored in OV._add per
   side; they map to QB + the IA but do NOT affect the statement balance check. ----- */
function additions(side){ return (OV._add && OV._add[side]) || []; }
function addAddition(side){ OV._add=OV._add||{}; OV._add[side]=OV._add[side]||[]; const cat=catList(side)[0]; OV._add[side].push({label:'',debit:null,credit:null,category:cat,sub:firstSub(cat)}); saveOV(); renderActive(); }
function setAddition(side,idx,field,val){ const a=additions(side); if(!a[idx]) return; if(field==='debit'||field==='credit') val=val===''?null:+val; a[idx][field]=val; if(field==='category') a[idx].sub=firstSub(val); saveOV(); renderActive(); }
function delAddition(side,idx){ const a=additions(side); if(a[idx]){ a.splice(idx,1); saveOV(); renderActive(); } }
/* ----- QB-only manual ledger entries -----
   Live in OV._qbManual (localStorage), separate from the imported/auto lines, so a
   fresh statement upload overwrites the auto lines but never touches manual entries.
   Source is chosen per entry ("QB" default, or "manual"). Reconciled against the
   imported ledger by Category + Sub + Amount; unmatched entries flag red (see qbRecon). */
function qbManual(){ return OV._qbManual || []; }
function addQbManual(){ OV._qbManual=OV._qbManual||[]; const cat=Object.keys(taxCats())[0]; OV._qbManual.push({label:'',source:'QB',category:cat,sub:firstSub(cat),amount:null}); saveOV(); renderActive(); }
function setQbManual(idx,field,val){ const a=qbManual(); if(!a[idx]) return; if(field==='amount') val=val===''?null:+val; a[idx][field]=val; if(field==='category') a[idx].sub=firstSub(val); saveOV(); renderActive(); }
function delQbManual(idx){ const a=qbManual(); if(a[idx]){ a.splice(idx,1); saveOV(); renderActive(); } }
// Reconcile manual entries against the imported ledger (statement lines + additions).
// A manual entry matches when an imported line shares Category + Sub AND Amount (±0.01).
// Returns red-flag maps: redMan[manualIdx] and redImp[importedRowKey] with a reason.
function qbRecon(){
  const imported = qbRows().filter(r=>!r.isManual);
  const used=new Set();                       // each imported row may satisfy at most one manual row
  const redMan={}, redImp={}; let matched=0, unmatched=0;
  qbManual().forEach((m,idx)=>{
    if(m.amount==null && !(m.label||'').trim()) return;   // ignore blank rows
    const key=(m.category||'')+'|'+(m.sub||'');
    const cands=imported.filter(r=>!used.has(qbRowKey(r)) && ((r.Category||'')+'|'+(r.Sub||''))===key);
    const hit=cands.find(r=>Math.abs((+r.Amount||0)-(+m.amount||0))<0.01);
    if(hit){ used.add(qbRowKey(hit)); matched++; return; }   // reconciled 1:1
    unmatched++;
    if(!cands.length){ redMan[idx]='No imported line for '+(m.category||'?')+' / '+(m.sub||'?'); }
    else { redMan[idx]='Amount '+money(m.amount)+' differs from imported';
           cands.forEach(r=>{ redImp[qbRowKey(r)]='Manual entry expects '+money(m.amount); }); }
  });
  return {redMan,redImp,matched,unmatched};
}
function qbRowKey(r){ return r.isIA?('ia:'+r.idx):(r.isAdd?('add:'+r.side+':'+r.idx):(r.side+':'+r.idx)); }
function tabFor(side){ return side==='qb' ? 'qb' : (side==='buySide' ? 'buy' : 'sell'); }
function setParsing(side,v){ window.__parsing=window.__parsing||{}; window.__parsing[side]=v; }
function isParsing(side){ return !!(window.__parsing && window.__parsing[side]); }
function setParseErr(side,msg){ window.__parseErr=window.__parseErr||{}; if(msg) window.__parseErr[side]=msg; else delete window.__parseErr[side]; }
function parseErr(side){ return window.__parseErr && window.__parseErr[side]; }
async function tryParse(side){
  setParseErr(side,'');                             // clear any prior error for this side
  try{
    const src=srcState(side); const f=window.__stmtFiles&&window.__stmtFiles[side];
    let res;
    if(f){ const fd=new FormData(); fd.append('file',f); fd.append('side',side); res=await fetch('/api/parse',{method:'POST',body:fd}); }
    else { res=await fetch('/api/parse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({side,link:src.url})}); }
    if(res && res.ok){
      const j=await res.json();
      if(j && Array.isArray(j.lines) && j.lines.length){
        if(!D[side]) D[side]={lines:[]};
        D[side].lines=j.lines; if(j.meta) Object.assign(D[side], j.meta);
        if(OV._src && OV._src[side]) OV._src[side].parsed=true;
        OV['_data_'+side]={lines:D[side].lines, meta:j.meta||null};
        saveOV();
      } else { setParseErr(side,'No lines found in that document. Check the file or paste the text.'); }
    } else if(res){                                  // backend reachable but returned an error
      let j={}; try{ j=await res.json(); }catch(e){}
      const m=j.error||'';
      if(res.status===503){ setParseErr(side,'AI parsing is off (no API key) — the file is attached; map lines manually.'); }
      else {
        let msg = m || ('Could not process the file ('+res.status+').');
        if(j.stop_reason){ msg += ` <span class="muted">(stop_reason: ${esc(String(j.stop_reason))}${j.stop_reason==='max_tokens'?' — output was truncated':''})</span>`; }
        if(j.raw){ msg += `<details class="raw-dump"><summary>Show raw model output</summary><pre>${esc(String(j.raw))}</pre></details>`; }
        setParseErr(side, msg);
      }
    }
  }catch(e){ setParseErr(side,'Could not reach the parser. The file is attached; map lines manually.'); }
  finally{ setParsing(side,false); render(tabFor(side)); }   // clear the spinner; show whatever we have
}
function processingCard(){
  return `<div class="section proc-card"><span class="spinner"></span><div><div class="proc-t">Processing…</div><div class="proc-s">Reading and formatting your statement — this takes a few seconds.</div></div></div>`;
}
function errCard(side){ const m=parseErr(side); return m ? `<div class="warn warn-err">⚠ ${m}</div>` : ''; }
function uploadCard(sideKey){
  const label = sideKey==='buySide' ? 'buy-side' : sideKey==='qb' ? 'QuickBooks accounting' : 'sell-side';
  const s = srcState(sideKey);
  const have = s.name || s.url;
  // Once a doc is attached the dropzone collapses; the file shows as a chip in the
  // statement header (docChip) with an ✕ that clears it and brings the dropzone back.
  if(have) return '';
  return `<div class="upl" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="dropStmt('${sideKey}',event)">
     <div class="upl-row">
       <div class="upl-ico">⬆</div>
       <div class="upl-txt">
         <div class="upl-t">Add the ${label}${sideKey==='qb' ? '' : ' settlement statement'}</div>
         <div class="upl-s">Drag &amp; drop a PDF / image / XLSX here, or
           <label class="upl-browse">browse your computer<input type="file" accept=".pdf,.png,.jpg,.jpeg,.webp,.xlsx,.csv" onchange="fileStmt('${sideKey}',this)"></label></div>
       </div>
       <div class="upl-link">
         <span>or paste a Google Doc / Drive link</span>
         <input type="url" placeholder="https://docs.google.com/…" value="${s.url||''}" onchange="linkStmt('${sideKey}',this.value)">
       </div>
     </div>
     <div class="upl-drop">⬇ Drop your file here</div>
   </div>`;
}
function docChip(sideKey){
  const s = srcState(sideKey);
  const have = s.name || s.url;
  if(!have) return '';
  const status = s.parsed ? '<span class="ok">parsed ✓</span>'
    : '<span class="muted">attached · auto-parses on the backend, lines stay editable</span>';
  return `<div class="doc-chip">📎 <b>${s.name||s.url}</b> · Mode <b>${D.ia.inputs.mode}</b> · ${status}<a class="doc-x" title="Remove document — show the dropzone again" onclick="clearStmt('${sideKey}')">✕</a></div>`;
}

/* ----- closing tabs ----- */
function renderClosing(sideKey, tabKey){
  if(isParsing(sideKey)){ $('#panel').innerHTML = docChip(sideKey) + processingCard(); return; }
  const side = D[sideKey];
  // Empty state: no statement lines yet -> show ONLY the upload dropzone (no header/tables/totals).
  if(!side || !Array.isArray(side.lines) || side.lines.length===0){
    $('#panel').innerHTML = uploadCard(sideKey) + docChip(sideKey) + errCard(sideKey);
    return;
  }
  // group by section, preserving statement order
  const groups={}, order=[];
  side.lines.forEach((l,i)=>{ if(!groups[l.section]){groups[l.section]=[];order.push(l.section);} groups[l.section].push(i); });

  // statement-style header card (preceded by the ingest dropzone)
  let html = uploadCard(sideKey) + `<div class="stmt-hd">
     <div class="stmt-hd-l">
       <div class="stmt-co">${side.escrowCompany||''}</div>
       <div class="stmt-ttl">${side.title} <span class="stmt-badge ${side.status==='FINAL'?'fin':'est'}">${side.status}</span></div>
       ${docChip(sideKey)}
     </div>
     <div class="stmt-meta">
       <div><span>Property</span>${side.property||D.deal.address}</div>
       <div><span>${side.role||'Party'}</span>${side.party||'—'}</div>
       <div><span>Escrow No.</span>${side.escrowNo||'—'}</div>
       <div><span>Statement Date</span>${side.date||'—'}</div>
       <div><span>Closing / Record</span>${side.closingDate||side.date||'—'}</div>
     </div>
   </div>
   <div class="note" style="margin:0 0 14px">Laid out to match the settlement statement — each line keeps its Debit/Credit. Map every line to a Category + Sub-category; the % badge is my confidence (hover for why). Edits re-roll into QB + the IA.</div>`;

  let tDeb=0, tCred=0;
  order.forEach(g=>{
    html += `<div class="section"><h2 class="stmt-sec">${g}</h2>
      <table class="stmt"><colgroup><col class="c-desc"><col class="c-num"><col class="c-num"><col class="c-cat"><col class="c-cat"><col class="c-cf"></colgroup><thead><tr><th>Description</th><th class="num deb">Debits</th><th class="num cred">Credits</th><th>Category</th><th>Sub-category</th><th class="cf">Conf.</th></tr></thead><tbody>`;
    groups[g].forEach(i=>{
      const s=lineState(sideKey,i); const k=sideKey+':'+i;
      const isCredit = s.credit!=null || (s.debit==null && /deposit|proceeds|trust deed|sale price|credit/i.test(s.label));
      tDeb += s.debit||0; tCred += s.credit||0;
      const debCell = isCredit ? '<span class="dash">—</span>'
        : `<input class="num" value="${s.debit==null?'':s.debit}" placeholder="—" onchange="setOV('${k}','debit',this.value);render('${tabKey}')">`;
      const credCell = isCredit
        ? `<input class="num" value="${s.credit==null?'':s.credit}" placeholder="—" onchange="setOV('${k}','credit',this.value);render('${tabKey}')">`
        : '<span class="dash">—</span>';
      html += `<tr id="src-${sideKey}-${i}">
        <td class="desc">${s.label}${s.overridden?' <span class="pill">edited</span>':''}</td>
        <td class="num deb">${debCell}</td>
        <td class="num cred">${credCell}</td>
        <td><select onchange="setOV('${k}','category',this.value);setOV('${k}','sub',firstSub(this.value));render('${tabKey}')">${catOptions(s.category,sideKey)}</select></td>
        <td><select onchange="setOV('${k}','sub',this.value);render('${tabKey}')">${subOptions(s.category,s.sub)}</select></td>
        <td class="cf"><span class="help" title="${s.why.replace(/"/g,'&quot;')}">${badge(s.confidence)}</span></td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });

  // TOTAL / balance footing (universal: a statement balances via a net-proceeds / funds-to-close line)
  const diff = tDeb-tCred, bal = Math.abs(diff) < 0.01;
  const role = (side.role||'party');
  const netMsg = diff<0 ? `Net proceeds to ${role}: ${money(-diff)}` : `Funds to close from ${role}: ${money(diff)}`;
  html += `<div class="section"><table class="stmt stmt-total"><colgroup><col class="c-desc"><col class="c-num"><col class="c-num"><col class="c-cat"><col class="c-cat"><col class="c-cf"></colgroup><tbody><tr>
     <td class="desc"><b>TOTAL</b></td>
     <td class="num deb"><b>${money(tDeb)}</b></td>
     <td class="num cred"><b>${money(tCred)}</b></td>
     <td colspan="3" class="${bal?'bal-ok':'bal-net'}">${bal?'✓ Balanced':netMsg+' <span class="bal-hint">(balancing line — add on the actual statement to foot to zero)</span>'}</td>
   </tr></tbody></table></div>`;

  // ESCROW RECONCILIATION (sell side, Mode: Sold only): IA estimate (G56) vs statement net proceeds.
  // Styled to match the IA design; read-only, no UI controls.
  if(sideKey==='sellSide' && (effIA().mode||'')==='Sold'){
    const stmtNet = tCred - tDeb;                       // cash leaving escrow per the statement
    const model = computeIA(effIA()).cashOutEscrow;     // MASTER IA "Cash out of escrow" (G56), computed live from the IA
    const cd = stmtNet - model;                         // statement − model (not forced to zero)
    const match = Math.abs(cd) < 0.01;
    html += `<div class="section"><div class="band">Escrow Reconciliation</div>
       <div class="summary">
         <div class="s"><span>Cash out of escrow (IA estimate)</span><span>${money(model)}</span></div>
         <div class="s"><span>Net proceeds to ${role} (Sell-Side Closing)</span><span>${money(stmtNet)}</span></div>
         <div class="s tot"><span class="lab">${match?'✓ Match':'Diff — update one side'}</span><span class="tval">${money(cd)}</span></div>
       </div>
       <div class="note">Estimate now; the actual replaces it when the sell-side statement is ingested.</div>
     </div>`;
  }

  // ADDITIONS — user items not on the closing statement. Do NOT affect the balance above.
  const adds = additions(sideKey);
  const addRows = adds.map((a,idx)=>`<tr>
     <td class="desc"><input class="add-desc" value="${(a.label||'').replace(/"/g,'&quot;')}" placeholder="Description" onchange="setAddition('${sideKey}',${idx},'label',this.value)"></td>
     <td class="num deb"><input class="num" value="${a.debit==null?'':a.debit}" placeholder="—" onchange="setAddition('${sideKey}',${idx},'debit',this.value)"></td>
     <td class="num cred"><input class="num" value="${a.credit==null?'':a.credit}" placeholder="—" onchange="setAddition('${sideKey}',${idx},'credit',this.value)"></td>
     <td><select onchange="setAddition('${sideKey}',${idx},'category',this.value)">${catOptions(a.category,sideKey)}</select></td>
     <td><select onchange="setAddition('${sideKey}',${idx},'sub',this.value)">${subOptions(a.category,a.sub)}</select></td>
     <td class="cf"><a class="delx" title="Remove line" onclick="delAddition('${sideKey}',${idx})">✕</a></td>
   </tr>`).join('');
  html += `<div class="section"><h2 class="stmt-sec">Additions (not on the closing statement)</h2>
     <div class="note" style="margin:0 0 8px">Extra items you want tracked that aren't on the settlement statement. They map to QB + the IA but do <b>not</b> affect the statement balance check above.</div>
     <table class="stmt"><colgroup><col class="c-desc"><col class="c-num"><col class="c-num"><col class="c-cat"><col class="c-cat"><col class="c-cf"></colgroup>
     <thead><tr><th>Description</th><th class="num deb">Debits</th><th class="num cred">Credits</th><th>Category</th><th>Sub-category</th><th class="cf"></th></tr></thead>
     <tbody>${addRows || `<tr><td class="desc muted" colspan="6">No additions yet.</td></tr>`}</tbody></table>
     <div class="addrow"><a class="addcost" onclick="addAddition('${sideKey}')">+ Add line</a></div>
   </div>`;

  // resale tax block on sell side
  if(sideKey==='sellSide') html += resaleTaxBlock();
  $('#panel').innerHTML = html;
}

function resaleTaxBlock(){
  const _e=effIA(), t=D.taxInputs, price=_e.arv, purchase=_e.purchasePrice;
  const tt = transferTax(price, t.transferTaxRatePer1000);
  const prorate = countyProration(t.semiAnnualBill, 12); // sample 12-day seller share
  const supp = supplemental(purchase, t.priorAssessedValue, t.annualTaxRatePct, 0.5);
  const prior = (t.priorAssessedValue==null ? purchase*0.60 : t.priorAssessedValue);
  const suppBase = purchase - prior;
  const apnTip = `APN ${D.deal.apn}, ${D.deal.county} County. ${t.annualTaxRateSource}`;
  // Each line shows its own formula so the math is explicit.
  const rows=[
    {key:'resaleTax:transferTax', label:'Documentary Transfer Tax', amt:tt, conf:100, why:t.transferTaxSource,
      math:`${money(price)} (ARV) × ${(+t.transferTaxRatePer1000).toFixed(2)} ÷ 1,000`},
    {key:'resaleTax:proration', label:'County Property Tax Proration (30/360)', amt:prorate, conf:90, why:t.dayCountSource,
      math:`${money(t.semiAnnualBill)} (semi-annual bill) ÷ 180 days × 12 days (seller share)`},
    {key:'resaleTax:supplemental', label:'Supplemental Tax (reassessment)', amt:supp, conf:70, why:t.supplementalNote+' '+apnTip,
      math:`(${money(purchase)} purchase − ${money(prior)} prior assessed${t.priorAssessedValue==null?' est. @60%':''}) × ${t.annualTaxRatePct}% × 0.5 yr = ${money(suppBase)} × ${t.annualTaxRatePct}% × 0.5`},
  ];
  const sel=k=>(OV[k]||{});
  const anyUnmapped = rows.some(r=>!sel(r.key).category);
  const secStyle = anyUnmapped ? ' style="border:2px solid #d33;border-radius:8px"' : '';
  const headStyle = anyUnmapped ? ' style="color:#d33"' : '';
  const body = rows.map(r=>{
    const s=sel(r.key);
    return `<tr>
      <td class="desc">${r.label}<div class="note" style="margin:3px 0 0">= ${r.math}</div></td>
      <td class="num">${money(r.amt)}</td>
      <td><select onchange="setOV('${r.key}','category',this.value);setOV('${r.key}','sub',this.value?firstSub(this.value):'');render('sell')">${dontMapCat(s.category)}</select></td>
      <td><select onchange="setOV('${r.key}','sub',this.value);render('sell')">${dontMapSub(s.category,s.sub)}</select></td>
      <td class="cf"><span class="help" title="${(r.why||'').replace(/"/g,'&quot;')}">${badge(r.conf)} why</span></td>
    </tr>`;
  }).join('');
  return `<div class="section"${secStyle}><h2${headStyle}>Resale — Tax (auto-calculated) <span class="pill">CA</span>${anyUnmapped?' <span class="pill" style="background:#d33;color:#fff">unmapped</span>':''}</h2>
    <table class="stmt"><colgroup><col class="c-desc"><col class="c-num"><col class="c-cat"><col class="c-cat"><col class="c-cf"></colgroup>
    <thead><tr><th>Tax (with math)</th><th class="num">Amount</th><th>Category</th><th>Sub-category</th><th class="cf">Conf.</th></tr></thead>
    <tbody>${body}</tbody></table>
    <div class="note">Rate ${t.annualTaxRatePct}% is a placeholder — confirm against the secured bill for ${D.deal.apn}. County vs. Supplemental are split deliberately: the supplemental reassessment bite is most of this deal's remaining margin. These are auto-calculated cross-checks: left as “Don't Map” (default) they stay informational and do not post to QuickBooks — the actual sell-side statement lines already carry these taxes.</div>
  </div>`;
}

/* ----- IA tab : FULL MASTER IA v4.1 model ----- */
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
// Actual calendar days in the month of a YYYY-MM-DD date (parsed manually to avoid TZ drift).
function daysInMonth(dateStr){ const p=(''+(dateStr||'')).split('-'); const y=+p[0], m=+p[1]; if(!y||!m) return 30; return new Date(y, m, 0).getDate(); }

// Port of every MASTER IA formula. Returns all derived values. (Cells noted for traceability.)
function computeIA(i){
  const r={};
  // override layer: any derived line item can be hand-edited (stored as ov_<key>); totals always recompute
  const ov=(k,c)=> (i['ov_'+k]!=null && i['ov_'+k]!=='') ? +i['ov_'+k] : c;
  // user-added custom cost lines per section (sum into the relevant total)
  const cSum=(sec)=> ((i.customLines&&i.customLines[sec])||[]).reduce((a,l)=>a+(+l.amount||0),0);
  r.days   = daysBetween(i.coeDate, i.eomDate);              // F6
  r.months = r.days/30;                                      // E2
  // TOTAL PURCHASE
  r.totalPurchase = i.purchasePrice+i.dueDiligence+i.insurance+i.cashForKeys+i.escrowTitlePurchase+i.proratedPropTaxPurchase+cSum('purchase'); // B10 (transfer tax lives in Sales Cost as a sell-side cost, not here)
  // loan sizing — 1st loan is the LOWER of two caps: 75% of ARV, or 90% of the all-in cost
  // (purchase all-in + repairs baked in). Both % factors are editable (arvLoanPct/costLoanPct).
  r.arvLoanPct  = (i.arvLoanPct==null||i.arvLoanPct==='')   ? 0.75 : +i.arvLoanPct;
  r.costLoanPct = (i.costLoanPct==null||i.costLoanPct==='') ? 0.90 : +i.costLoanPct;
  r.pct75ARV  = i.arv * r.arvLoanPct;                        // F15 — ARV cap
  r.pct90Cost = (i.purchasePrice + (+i.dueDiligence||0)) * r.costLoanPct;  // F16 — Excel: (Purchase + Due Diligence) × 90% (NOT all-in incl. repairs)
  r.loan1st   = (i.overrideLoanAmt!=null && i.overrideLoanAmt!=='') ? +i.overrideLoanAmt : Math.min(r.pct75ARV, r.pct90Cost); // F14 — lowest of the two caps
  r.moPayment = r.loan1st*i.interestRate1st/12;              // F17
  r.dayInMonth = daysInMonth(i.coeDate);                     // auto: calendar days in the buy-side COE month
  // Odd Days = days remaining in the close month, derived from the buy-side close date (coeDate),
  // whether that date is the Estimated or the Actual/Acquired buy-side closing. Not a manual entry.
  const coeDay = +(''+(i.coeDate||'')).split('-')[2] || 0;
  r.oddDays = coeDay ? (r.dayInMonth - coeDay) : 0;
  r.proratedPayment = (r.moPayment/r.dayInMonth)*(r.oddDays||0);  // F20
  r.shortFunds = r.loan1st - i.estimatedRepairs - (r.loan1st*i.points1st) - i.estLoanFees1st - (+i.additional1stPayments||0); // F21 (net loan proceeds, less add'l 1st payments B17)
  r.cashInclPayments = r.moPayment*(r.months*1.25);          // F9
  r.cashToClose = r.totalPurchase - r.shortFunds;            // F10
  // 1st loan line items
  r.prepaidInt1st = ov('prepaidInt1st', r.proratedPayment);  // B13
  r.intOnNewLoan1st = ov('intOnNewLoan1st', r.moPayment*r.months); // B14
  r.loanOrig1st = ov('loanOrig1st', r.loan1st*i.points1st);  // B15
  r.loanFeesAppr1st = ov('loanFeesAppr1st', i.estLoanFees1st);// B16
  r.lender1st = r.prepaidInt1st+r.intOnNewLoan1st+r.loanOrig1st+r.loanFeesAppr1st+(+i.additional1stPayments||0)-(+i.unused1stCredit||0)+(+i.interestFrom1stPayoff||0)+cSum('lender1');
  // 2nd loan — mirrors the 1st-loan design: rate/points drive interest & origination,
  // and the "Est. Loan Fees" param defaults into the Loan Fees 2nd ledger line.
  r.intOnNewLoan2nd = ov('intOnNewLoan2nd', (+i.loan2ndAmount||0)*(+i.interestRate2nd||0)/12*r.months); // B24
  r.loanOrig2nd = ov('loanOrig2nd', (+i.loan2ndAmount||0)*(+i.points2nd||0)); // B25
  r.loanFees2nd = ov('loanFees2nd', (+i.loanFees2nd||0) || (+i.estLoanFees2nd||0)); // prefer legacy ledger value, else Est. Loan Fees param
  r.lender2nd = (+i.prepaidInt2nd||0)+r.intOnNewLoan2nd+r.loanOrig2nd+r.loanFees2nd+(+i.additional2ndPayments||0)-(+i.unused2ndCredit||0)+(+i.interestFrom2ndPayoff||0)+cSum('lender2');
  r.totalLender = r.lender1st+r.lender2nd;                   // B30
  // cash deals carry no lender cost — zero the financing side entirely
  // and make the cash-to-close / cash-invested autos reflect a no-loan reality.
  r.isCash = /cash/i.test(i.financingType||'');
  if(r.isCash){
    r.lender1st=0; r.lender2nd=0; r.totalLender=0;
    r.loan1st=0; r.moPayment=0; r.proratedPayment=0; r.shortFunds=0;
    r.cashInclPayments=0;
    r.cashToClose=r.totalPurchase;
  }
  // cash reserves held for the hold period (editable; defaults to 5,000)
  r.reserves = (i.reserves==null||i.reserves==='') ? 5000 : +i.reserves;
  r.totalCashAndReserves = r.cashInclPayments + r.cashToClose + r.reserves + cSum('reserves');
  // rehab
  r.totalRehab = (+i.estimatedRepairs||0)+(+i.utilitiesRehab||0);        // B34 (custom "+ add cost" lines roll into Misc, not Rehab)
  // supplemental tax (B38) -- only fires if taxFactor set (overridable)
  r.supplemental = ov('supplemental', (i.taxFactorW23==null||i.taxFactorW23==='') ? 0
      : (i.purchasePrice - (i.taxAssessedValue==null||i.taxAssessedValue===''? i.purchasePrice*0.60 : +i.taxAssessedValue)) * (+i.taxFactorW23));
  // misc costs (B36:B40) -> Misc Less Interest E50
  r.miscLessInterest = (+i.roiAdjustments||0)+(+i.miscellaneousCosts||0)+r.supplemental+((+i.hoaMonthly||0)*r.months)+cSum('rehab'); // SUM(B36:B40) + custom rehab add-costs
  // 2nd loan suggested amount (F25 = F9 + F10 + repairs*25%)
  r.loan2ndSuggested = r.cashInclPayments + r.cashToClose + i.estimatedRepairs*0.25;
  // resale / gross profit
  const resaleMode = (i.mode||'')==='Sold';                  // buyers/concessions only book once the deal is Sold
  r.escrowTitleResale = ov('escrowTitleResale', i.arv*i.escrowTitleResalePct);        // B46
  r.transferTaxResale = ov('transferTaxResale', transferTax(i.arv, D.taxInputs.transferTaxRatePer1000)); // sell-side documentary transfer tax
  r.proratedTaxResale = ov('proratedTaxResale', i.purchasePrice*i.proratedTaxResaleRate/12*r.months); // B47
  r.concessions = ov('concessions', i.arv*i.concessionsPct);   // B48 (books from % always; actual from sell-side overrides)
  r.buyersComm  = ov('buyersComm', i.arv*i.buyersAgentPct);    // B49 (default 2% estimate; actual from sell-side statement overrides)
  r.listingComm = ov('listingComm', i.arv*i.listingAgentPct);                   // B50
  r.perDiem     = (+i.perDiemAdjustment||0);                 // B51
  r.assetMgmt   = ov('assetMgmt', i.arv*i.assetMgmtPct);                        // B52
  r.resaleCosts = r.escrowTitleResale+r.transferTaxResale+r.proratedTaxResale+r.concessions+r.buyersComm+r.listingComm+r.perDiem+r.assetMgmt+cSum('gross');
  r.grossProfit = i.arv - r.resaleCosts;                     // B53
  // development cost
  r.totAcq=r.totalPurchase; r.hardMoney=r.totalLender; r.rehabCost=r.totalRehab; // E47,E48,E49
  r.totalDevCost = r.totAcq+r.hardMoney+r.rehabCost+r.miscLessInterest; // E51
  // net
  r.netProfit = r.grossProfit - r.totAcq - r.hardMoney - r.rehabCost - r.miscLessInterest; // B55
  r.roi = (r.netProfit+r.totalLender)/(r.totAcq+r.rehabCost); // B56
  r.irr = r.days>0 ? Math.pow(1+r.roi, 365/r.days)-1 : 0;     // B57 — compounded annualized return
  r.irrLinear = r.days>0 ? r.roi/r.days*360 : 0;             // linear IRR (Excel B58 = ROI/days*360)
  // NET PROFITS metrics — MASTER IA B56–B59 (the authoritative workbook formulas)
  // (1) Cash ROI (unlevered) = (Net Profit + Total Lender cost) ÷ (Acquisition + Rehab)   [B56]
  r.cashOnCashROI = (r.totAcq+r.rehabCost)>0 ? (r.netProfit+r.totalLender)/(r.totAcq+r.rehabCost) : 0;
  r.cashOnCashIRR = r.days>0 ? r.cashOnCashROI/r.days*360 : 0;   // (2) Cash IRR = Cash ROI ÷ days × 360 [B57]
  // (3) Levered ROI = Net Profit ÷ equity invested F25 (= cash incl. payments + cash-to-close + 25% rehab) [B58]
  r.f25equity = r.cashInclPayments + r.cashToClose + (+i.estimatedRepairs||0)*0.25;   // F25
  r.returnOnCash = r.f25equity>0 ? r.netProfit/r.f25equity : 0;
  r.returnOnCashAnnual = r.days>0 ? r.returnOnCash/r.days*360 : 0;   // (4) Levered IRR = Levered ROI ÷ days × 360 [B59]
  // Cash out of escrow (MASTER IA G56) = Gross Profit to Seller − 1st-loan payoff − add'l 1st pmts
  // − unused 1st credit − interest from 1st payoff − 2nd "Loan Amount" (F25 = total cash invested + any 2nd loan).
  r.cashOutEscrow = r.grossProfit - r.loan1st - (+i.additional1stPayments||0) - (+i.unused1stCredit||0)
      - (+i.interestFrom1stPayoff||0) - (r.totalCashAndReserves + (+i.loan2ndAmount||0));   // G56
  return r;
}

const pct=(n)=> (n==null||isNaN(n))?'' : (n*100).toFixed(2)+'%';
// two-decimal display for editable $ inputs; leaves non-numeric strings (dates/text) untouched
const fmt2=(v)=>{ if(v==null||v==='')return''; const n=+(''+v).replace(/[$,\s]/g,''); return isNaN(n)?v:n.toFixed(2); };
function setIA(key,val){
  // Can't change the deal Mode while there is no closing data — it must stay "Estimated".
  if(key==='mode' && !hasClosingData()) return;
  let v;
  if(val===''||val===null){ v=null; }
  else if(typeof val==='string'){
    const cleaned=val.replace(/[$,\s]/g,'');
    v=(cleaned!=='' && !/[a-zA-Z]/.test(val) && !isNaN(+cleaned)) ? +cleaned : val;

let IA_ACTUAL = {};
// Actuals overlay the IA only once the deal MODE says they exist: buy-side actuals at
// "Acquired" or "Sold", sell-side actuals at "Sold". In "Estimated" mode the IA always shows
// the estimates (byte-identical), even if a statement is already attached — Mode is the switch.
function hasActualStmt(side){
  const s=srcState(side); if(!(s.name||s.url)) return false;
  const mode=(D.ia.inputs&&D.ia.inputs.mode)||'';
  if(side==='buySide') return /Acquired|Sold/i.test(mode);
  if(side==='sellSide') return /Sold/i.test(mode);
  return false;
}
function iaActuals(){
  const ov={};
  const addv=(key,amt)=>{ if(!key||amt==null) return; ov[key]=(ov[key]||0)+(+amt||0); };
  // A loan disbursement / payoff is PRINCIPAL (a financing flow), not an IA cost — even
  // though the closing buckets it under a Lender "interest" sub. Route it to the loan
  // amount and never into an interest/cost field, or it would dwarf the real interest.
  const isPrincipal=(s)=> /Lender Cost/.test(s.category||'') && /(payoff|principal|trust deed|loan proceeds)/i.test(s.label||'') && !/interest/i.test(s.label||'');
  const take=(s)=>{
    const key=SUB2IA[(s.category||'')+'|'+(s.sub||'')];
    if(!key) return;
    if(key==='arv'){ addv('arv', s.credit!=null?s.credit:s.debit); return; }   // sale price books as a credit
    if(isPrincipal(s)){ const amt=s.debit!=null?s.debit:(s.credit!=null?s.credit:null); if(amt!=null) ov.overrideLoanAmt=Math.max(+ov.overrideLoanAmt||0, Math.abs(amt)); return; }
    if(s.debit!=null) addv(key, s.debit);   // costs book as debits; ignore credits (deposits / refunds)
  };
  ['buySide','sellSide'].forEach(side=>{
    if(!hasActualStmt(side)) return;
    (D[side].lines||[]).forEach((l,idx)=> take(lineState(side,idx)));
    additions(side).forEach(a=> take({category:a.category, sub:a.sub, label:a.label, debit:a.debit, credit:a.credit}));
  });
  return ov;
}
// IA inputs with ACTUAL closing numbers overlaid (when a statement is attached); otherwise
// the manual estimate inputs unchanged. Refreshes IA_ACTUAL for L$()'s actual/locked styling.
function effIA(){ IA_ACTUAL=iaActuals(); const ks=Object.keys(IA_ACTUAL); return ks.length?Object.assign({},D.ia.inputs,IA_ACTUAL):D.ia.inputs; }
function isActualKey(key){ return IA_ACTUAL && Object.prototype.hasOwnProperty.call(IA_ACTUAL,key); }
// All closing-statement line indices whose mapped category|sub feeds this IA total.
// Mirrors iaActuals(): cost keys take debits, arv takes credit/debit, loan principal is excluded.
function srcLinesFor(key, mode){
  const hits=[];
  const sides = mode==='Sold' ? ['buySide','sellSide'] : (mode==='Acquired' ? ['buySide'] : []);
  const isPrincipal=(s)=> /Lender Cost/.test(s.category||'') && /(payoff|principal|trust deed|loan proceeds)/i.test(s.label||'') && !/interest/i.test(s.label||'');
  sides.forEach(side=>{
    if(!hasActualStmt(side)) return;
    (D[side].lines||[]).forEach((l,idx)=>{
      const s=lineState(side,idx);
      if(SUB2IA[(s.category||'')+'|'+(s.sub||'')]!==key) return;
      const contributes = key==='arv' ? (s.credit!=null||s.debit!=null) : (isPrincipal(s)?false:(s.debit!=null));
      if(contributes) hits.push({side, idx});
    });
  });
  return hits;
}
function srcLink(m,val,key){
  // Stage-gate link-backs by mode: Estimated -> none; Acquired -> buy-side only
  // (Purchase Cost + Lender Cost); Sold -> buy-side + sell-side (+ Gross Profit).
  const mode=(effIA().mode||'');
  if(mode!=='Acquired' && mode!=='Sold') return '';
  // Preferred: highlight EVERY closing-statement line feeding this IA total (handles fields
  // like "Escrow and Title" that aggregate several statement lines), not just one row.
  const hits = key ? srcLinesFor(key, mode) : [];
  if(hits.length){
    // One ↗ per side that contributes (a field can aggregate rows from both statements in Sold mode).
    let out='';
    ['buySide','sellSide'].forEach(side=>{
      const idxs=hits.filter(h=>h.side===side).map(h=>h.idx); if(!idxs.length) return;
      const sd=side==='buySide'?'Buy-side':'Sell-side', n=idxs.length;
      out += ` <a class="srclink" title="Source: ${n} ${sd} closing item${n>1?'s':''} feeding this total — click to highlight ${n>1?'them all':'it'}" onclick='gotoSourceMulti("${side}",${JSON.stringify(idxs)})'>↗</a>`;
    });
    return out;
  }
  // Fallback: a single canonical source row (fields with no live statement match).
  if(!m.src)return '';
  if(mode==='Acquired' && m.src[0]!=='buySide') return '';
  const base=D[m.src[0]]&&D[m.src[0]].lines[m.src[1]]; if(!base)return '';
  if(val==null||val===''||+val===0)return '';
  const sd=m.src[0]==='buySide'?'Buy-side':'Sell-side';
  return ` <a class="srclink" title="Source: ${sd} closing — click to open" onclick="gotoSource('${m.src[0]}',${m.src[1]})">↗</a>`;
}
function gotoSource(side,idx){

}

function gotoSourceMulti(side, idxs){

}

  // GROSS PROFITS — resale lines on the left, Total Development Cost summary on the right

  // NET PROFITS  (+ escrow reconciliation when Mode = Sold)

    const sellNet=_c-_d;                                                   // sell-side statement net proceeds

    const cashToSeller=r.grossProfit-r.loan1st+holdback-(+i.additional1stPayments||0)+(+i.unused1stCredit||0); // MASTER IA G55

    <div class="ai-actions">
