<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FlipAid · Closing Cockpit</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#f3f4f6; --card:#fff; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb;
    --accent:#f97316; --accent-soft:#fff1e6; --green:#16a34a; --amber:#d97706; --red:#dc2626;
    --radius:12px; --fs:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:var(--fs)/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  header.top{display:flex;align-items:center;gap:12px;padding:16px 28px;background:#fff;border-bottom:1px solid var(--line)}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--accent)}
  .title{font-size:20px;font-weight:700}
  .sub{color:var(--muted);font-size:14px}
  .saved{margin-left:auto;color:var(--green);font-size:13px}
  .tabs{display:flex;gap:24px;padding:0 28px;background:#fff;border-bottom:1px solid var(--line)}
  .tab{padding:14px 2px;cursor:pointer;color:var(--muted);font-weight:600;border-bottom:2px solid transparent}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab .count{font-size:11px;background:#f3f4f6;border-radius:10px;padding:2px 7px;margin-left:6px;color:var(--muted)}
  .wrap{max-width:1180px;margin:22px auto;padding:0 28px}
  .section{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;margin-bottom:18px}
  .section h2{font-size:16px;margin:0 0 16px;display:flex;align-items:center;gap:10px}
  .pill{font-size:11px;font-weight:600;background:var(--accent-soft);color:var(--accent);border-radius:10px;padding:2px 9px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 28px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:12px;color:var(--muted)}
  .field input,.field select{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:#fff}
  .field input[readonly]{background:#f9fafb;color:var(--muted)}
  .req{color:var(--red)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{color:var(--muted);font-weight:600;font-size:12px}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  td input,td select{width:100%;border:1px solid var(--line);border-radius:6px;padding:6px 7px;font-size:13px}
  td input.num{text-align:right}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;cursor:help}
  .b100{background:#dcfce7;color:#166534}
  .b90{background:#fef9c3;color:#854d0e}
  .b80{background:#ffedd5;color:#9a3412}
  .blo{background:#fee2e2;color:#991b1b}
  .help{border-bottom:1px dotted var(--muted);cursor:help}
  .row-tot td{font-weight:700;border-top:2px solid var(--ink)}
  .kpi{display:flex;gap:18px;flex-wrap:wrap}
  .kpi .box{flex:1;min-width:150px;background:#fafafa;border:1px solid var(--line);border-radius:10px;padding:14px}
  .kpi .box .k{font-size:12px;color:var(--muted)}
  .kpi .box .v{font-size:22px;font-weight:700;margin-top:4px}
  .v.good{color:var(--green)} .v.bad{color:var(--red)}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-weight:600;cursor:pointer;font-size:13px}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
  .warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
  .statusrow{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .statusrow select{padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-weight:600}
  .note{font-size:12px;color:var(--muted);margin-top:8px}
  .hidden{display:none}
  .help{cursor:help}
  /* ===== card-UI IA (MoM Connect look) ===== */
  .count{font-size:11px;font-weight:700;background:var(--accent-soft);color:var(--accent);border-radius:10px;padding:2px 9px;margin-left:8px}
  .field.full{grid-column:1 / -1}
  .field textarea{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font:inherit;min-height:62px;resize:vertical;background:#fff}
  .adorn{display:flex;align-items:center;border:1px solid var(--line);border-radius:8px;background:#fff;overflow:hidden}
  .adorn:focus-within{border-color:var(--accent)}
  .adorn .pre,.adorn .suf{padding:0 9px;color:var(--muted);font-size:13px;white-space:nowrap}
  .adorn input{border:none;border-radius:0;flex:1;min-width:0;padding:9px 8px;font:inherit}
  .adorn input:focus{outline:none}
  .field input.ro{background:#f3f4f6;color:#374151;font-weight:600;border-color:#e5e7eb}
  .autotag{color:var(--muted);font-weight:400;font-size:11px}
  /* ===== Excel-form IA (legacy, unused) ===== */
  .ia-doc{background:#fff;border:1px solid #b9b9b9;max-width:1180px;margin:0 auto;font-size:12.5px;color:#000}
  .ia-title{background:#1f4e79;color:#fff;text-align:center;font-weight:800;font-size:24px;padding:10px;letter-spacing:.02em}
  .ia-sub{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:7px 14px;border-bottom:1px solid #d9d9d9;flex-wrap:wrap}
  .ia-sub .addr{width:170px;font-weight:700;background:#e6e6e6}
  .ia-sub .modesel{padding:3px 6px;border:1px solid #c9c9c9}
  table.ia{width:100%;border-collapse:collapse;table-layout:fixed}
  table.ia col.cp{width:8%}  table.ia col.ca{width:13%} table.ia col.cl{width:27%}
  table.ia col.cmv{width:10%} table.ia col.cml{width:12%} table.ia col.crv{width:13%} table.ia col.crl{width:17%}
  table.ia td{padding:2px 8px;vertical-align:middle;overflow:hidden;text-overflow:ellipsis}
  td.band{background:#808080;color:#fff;text-align:center;font-weight:700;letter-spacing:.05em;padding:4px;font-size:12px}
  .ia td.p{text-align:right;color:#555;font-size:11.5px;font-variant-numeric:tabular-nums}
  .ia td.a{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
  .ia td.l{text-align:left}
  .ia td.mv{text-align:center;font-variant-numeric:tabular-nums}
  .ia td.ml{color:#222}
  .ia td.rv{text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
  .ia td.rl{text-align:left;color:#1f4e79}
  .ia td.rl.bk{color:#000;font-weight:700}
  .ia .subh{text-align:center;font-weight:700;padding:3px}
  .ia tr.tot td{border-top:2px solid #000;font-weight:700}
  .ia td.tot2{border-top:1px solid #000;font-weight:700}
  .ia td.red{color:#c00000;font-weight:700;text-align:right}
  .ia td.rt{text-align:right;font-weight:700}
  .ia td.box{border:2px solid #000;text-align:center;font-weight:700;font-size:10.5px;line-height:1.25;padding:3px}
  .ia td.dh{text-align:center;font-weight:700}
  .ia td.bld{font-weight:700}
  .ia td.a.big{font-size:15px}
  .iin{width:100%;background:#e6e6e6;border:1px solid #d6d6d6;text-align:right;padding:2px 5px;font:inherit;color:#000}
  .iin:focus{background:#fff;border-color:var(--accent);outline:none}
  .iin.pct{width:auto;max-width:58px;display:inline-block;text-align:right}
  .pcap{color:#555;font-size:11px}
  .ia a{color:#1f4e79;text-decoration:underline;font-size:10.5px;display:block}
</style>
</head>
<body>
<header class="top">
  <span class="dot"></span>
  <div>
    <div class="title">Closing Cockpit <span class="sub" id="dealAddr"></span></div>
  </div>
  <span class="saved" id="saved">✓ Saved locally</span>
</header>

<div class="tabs" id="tabs">
  <div class="tab active" data-tab="ia">Investment Analysis</div>
  <div class="tab" data-tab="buy">Buy-Side Closing</div>
  <div class="tab" data-tab="sell">Sell-Side Closing</div>
  <div class="tab" data-tab="qb">QB Accounting Export</div>
</div>

<div class="wrap">
  <div class="bar">
    <button class="btn" onclick="exportXlsx()">⬇ Download .xlsx (4 tabs)</button>
    <button class="btn ghost" onclick="evaluateDeal()">🤖 AI Evaluate &amp; Comment</button>
    <button class="btn ghost" onclick="resetOverrides()">↺ Reset overrides</button>
  </div>
  <div id="panel"></div>
</div>

<script>
let D=null, OV={};            // OV = user overrides keyed by line id
const $=s=>document.querySelector(s);
const money=n=> (n==null||n==='')?'—':'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const LS='flipaid-ramona-overrides';

/* ---------- CA TAX MATH (single source of truth) ---------- */
function transferTax(price, ratePer1000){ return +(price * ratePer1000/1000).toFixed(2); }
function countyProration(semiAnnual, days){ return +(semiAnnual/180*days).toFixed(2); } // 30/360
function supplemental(purchase, priorAssessed, annualRatePct, monthsFactor){
  const base = purchase - (priorAssessed==null? purchase*0.60 : priorAssessed);
  return +(base * (annualRatePct/100) * monthsFactor).toFixed(2);
}

/* ---------- load ---------- */
async function boot(){
  D = await (await fetch('./data/ramona.json')).json();
  try{ OV = JSON.parse(localStorage.getItem(LS)||'{}'); }catch(e){ OV={}; }
  $('#dealAddr').textContent = '· '+D.deal.address;
  bindTabs(); render('ia');
}
function bindTabs(){
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active'); render(t.dataset.tab);
  });
}
function saveOV(){ localStorage.setItem(LS, JSON.stringify(OV)); flashSaved(); }
function flashSaved(){ const s=$('#saved'); s.textContent='✓ Saved '+new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }

/* ---------- helpers for line state (override-aware) ---------- */
function lineState(side, idx){
  const k = side+':'+idx; const base = D[side].lines[idx];
  const o = OV[k]||{};
  return {
    amount: o.amount!==undefined ? o.amount : base.amount,
    category: o.category || base.map.category,
    sub: o.sub || base.map.sub,
    confidence: base.confidence, why: base.why, label: base.label, section: base.section,
    overridden: !!Object.keys(o).length
  };
}
function setOV(k,field,val){ OV[k]=OV[k]||{}; if(field==='amount') val=val===''?null:+val; OV[k][field]=val; saveOV(); }

function badge(c){
  const cls = c>=100?'b100':c>=90?'b90':c>=80?'b80':'blo';
  return `<span class="badge ${cls}">${c}%</span>`;
}
function catOptions(sel){
  return Object.keys(D.taxonomy.categories).map(c=>`<option ${c===sel?'selected':''}>${c}</option>`).join('');
}
function subOptions(cat,sel){
  return (D.taxonomy.categories[cat]||[]).map(s=>`<option ${s===sel?'selected':''}>${s}</option>`).join('');
}

/* ---------- RENDER ---------- */
function render(tab){
  if(tab==='ia') return renderIA();
  if(tab==='qb') return renderQB();
  return renderClosing(tab==='buy'?'buySide':'sellSide', tab);
}

/* ----- closing tabs ----- */
function renderClosing(sideKey, tabKey){
  const side = D[sideKey];
  // group by section
  const groups={};
  side.lines.forEach((l,i)=>{ (groups[l.section]=groups[l.section]||[]).push(i); });
  let html = `<div class="warn">${side.title} — <b>${side.status}</b> · ${side.date} · you are the <b>${side.role}</b>.
     Mapping dropdowns are pre-filled with my best guess; the % badge is my confidence — hover it for why. Change anything and it re-rolls into QB + the IA.</div>`;
  for(const g in groups){
    html += `<div class="section"><h2>${g} <span class="pill">${groups[g].length}</span></h2>
      <table><thead><tr><th>Line</th><th class="num">Amount</th><th>Category</th><th>Sub-category</th><th>Conf.</th></tr></thead><tbody>`;
    groups[g].forEach(i=>{
      const s=lineState(sideKey,i); const k=sideKey+':'+i;
      html += `<tr>
        <td>${s.label}${s.overridden?' <span class="pill">edited</span>':''}</td>
        <td class="num"><input class="num" value="${s.amount==null?'':s.amount}" placeholder="—"
            onchange="setOV('${k}','amount',this.value);render('${tabKey}')"></td>
        <td><select onchange="setOV('${k}','category',this.value);setOV('${k}','sub',D.taxonomy.categories[this.value][0]);render('${tabKey}')">${catOptions(s.category)}</select></td>
        <td><select onchange="setOV('${k}','sub',this.value);render('${tabKey}')">${subOptions(s.category,s.sub)}</select></td>
        <td><span class="help" title="${s.why.replace(/"/g,'&quot;')}">${badge(s.confidence)}</span></td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }
  // resale tax block on sell side
  if(sideKey==='sellSide') html += resaleTaxBlock();
  $('#panel').innerHTML = html;
}

function resaleTaxBlock(){
  const t=D.taxInputs, price=D.ia.inputs.arv;
  const tt = transferTax(price, t.transferTaxRatePer1000);
  const prorate = countyProration(t.semiAnnualBill, 12); // sample 12-day seller share
  const supp = supplemental(D.ia.inputs.purchasePrice, t.priorAssessedValue, t.annualTaxRatePct, 0.5);
  const apnTip = `APN ${D.deal.apn}, ${D.deal.county} County. ${t.annualTaxRateSource}`;
  return `<div class="section"><h2>Resale — Tax (auto-calculated) <span class="pill">CA</span></h2>
    <table><tbody>
    <tr><td>Documentary Transfer Tax</td><td class="num">${money(tt)}</td>
        <td><span class="help" title="${t.transferTaxSource.replace(/"/g,'&quot;')}">${badge(100)} why</span></td></tr>
    <tr><td>County Property Tax Proration (30/360)</td><td class="num">${money(prorate)}</td>
        <td><span class="help" title="${t.dayCountSource.replace(/"/g,'&quot;')}">${badge(90)} why</span></td></tr>
    <tr><td>Supplemental Tax (reassessment)</td><td class="num">${money(supp)}</td>
        <td><span class="help" title="${(t.supplementalNote+' '+apnTip).replace(/"/g,'&quot;')}">${badge(70)} why</span></td></tr>
    </tbody></table>
    <div class="note">Rate ${t.annualTaxRatePct}% is a placeholder — confirm against the secured bill for ${D.deal.apn}. County vs. Supplemental are split deliberately: the supplemental reassessment bite is most of this deal's remaining margin.</div>
  </div>`;
}

/* ----- IA tab : FULL MASTER IA v4.1 model ----- */
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }

// Port of every MASTER IA formula. Returns all derived values. (Cells noted for traceability.)
function computeIA(i){
  const r={};
  // override layer: any derived line item can be hand-edited (stored as ov_<key>); totals always recompute
  const ov=(k,c)=> (i['ov_'+k]!=null && i['ov_'+k]!=='') ? +i['ov_'+k] : c;
  r.days   = daysBetween(i.coeDate, i.eomDate);              // F6
  r.months = r.days/30;                                      // E2
  // TOTAL PURCHASE
  r.totalPurchase = i.purchasePrice+i.dueDiligence+i.insurance+i.cashForKeys+i.escrowTitlePurchase+i.proratedPropTaxPurchase; // B10
  // loan sizing
  r.pct90Cost = (i.purchasePrice+i.dueDiligence)*0.90;       // F16
  r.pct75ARV  = i.arv*0.75;                                  // F15
  r.loan1st   = (i.overrideLoanAmt!=null && i.overrideLoanAmt!=='') ? +i.overrideLoanAmt : r.pct90Cost+i.estimatedRepairs; // F14
  r.moPayment = r.loan1st*i.interestRate1st/12;              // F17
  r.proratedPayment = (r.moPayment/i.dayInMonth)*i.oddDays;  // F20
  r.shortFunds = r.loan1st - i.estimatedRepairs - (r.loan1st*i.points1st) - i.estLoanFees1st; // F21
  r.cashInclPayments = r.moPayment*(r.months*1.25);          // F9
  r.cashToClose = r.totalPurchase - r.shortFunds;            // F10
  // 1st loan line items
  r.prepaidInt1st = ov('prepaidInt1st', r.proratedPayment);  // B13
  r.intOnNewLoan1st = ov('intOnNewLoan1st', r.moPayment*r.months); // B14
  r.loanOrig1st = ov('loanOrig1st', r.loan1st*i.points1st);  // B15
  r.loanFeesAppr1st = ov('loanFeesAppr1st', i.estLoanFees1st);// B16
  r.lender1st = r.prepaidInt1st+r.intOnNewLoan1st+r.loanOrig1st+r.loanFeesAppr1st+(+i.additional1stPayments||0)-(+i.unused1stCredit||0)+(+i.interestFrom1stPayoff||0);
  // 2nd loan
  r.intOnNewLoan2nd = ov('intOnNewLoan2nd', (+i.loan2ndAmount||0)*i.interestRate2nd/12*r.months); // B24
  r.loanOrig2nd = ov('loanOrig2nd', (+i.loan2ndAmount||0)*i.points2nd); // B25
  r.lender2nd = (+i.prepaidInt2nd||0)+r.intOnNewLoan2nd+r.loanOrig2nd+(+i.loanFees2nd||0)+(+i.additional2ndPayments||0)-(+i.unused2ndCredit||0)+(+i.interestFrom2ndPayoff||0);
  r.totalLender = r.lender1st+r.lender2nd;                   // B30
  // rehab
  r.totalRehab = (+i.estimatedRepairs||0)+(+i.utilitiesRehab||0);        // B34
  // supplemental tax (B38) -- only fires if taxFactor set (overridable)
  r.supplemental = ov('supplemental', (i.taxFactorW23==null||i.taxFactorW23==='') ? 0
      : (i.purchasePrice - (i.taxAssessedValue==null||i.taxAssessedValue===''? i.purchasePrice*0.60 : +i.taxAssessedValue)) * (+i.taxFactorW23));
  // misc costs (B36:B40) -> Misc Less Interest E50
  r.miscLessInterest = (+i.roiAdjustments||0)+(+i.miscellaneousCosts||0)+r.supplemental+((+i.hoaMonthly||0)*r.months); // SUM(B36:B40)
  // 2nd loan suggested amount (F25 = F9 + F10 + repairs*25%)
  r.loan2ndSuggested = r.cashInclPayments + r.cashToClose + i.estimatedRepairs*0.25;
  // resale / gross profit
  const resaleMode = /Resale/.test(i.mode);                  // buyers/concessions only book in resale modes (Excel IF on H2)
  r.escrowTitleResale = ov('escrowTitleResale', i.arv*i.escrowTitleResalePct);        // B46
  r.proratedTaxResale = ov('proratedTaxResale', i.purchasePrice*i.proratedTaxResaleRate/12*r.months); // B47
  r.concessions = ov('concessions', resaleMode ? i.arv*i.concessionsPct : 0);   // B48
  r.buyersComm  = ov('buyersComm', resaleMode ? i.arv*i.buyersAgentPct : 0);    // B49
  r.listingComm = ov('listingComm', i.arv*i.listingAgentPct);                   // B50
  r.perDiem     = (+i.perDiemAdjustment||0);                 // B51
  r.assetMgmt   = ov('assetMgmt', i.arv*i.assetMgmtPct);                        // B52
  r.resaleCosts = r.escrowTitleResale+r.proratedTaxResale+r.concessions+r.buyersComm+r.listingComm+r.perDiem+r.assetMgmt;
  r.grossProfit = i.arv - r.resaleCosts;                     // B53
  // development cost
  r.totAcq=r.totalPurchase; r.hardMoney=r.totalLender; r.rehabCost=r.totalRehab; // E47,E48,E49
  r.totalDevCost = r.totAcq+r.hardMoney+r.rehabCost+r.miscLessInterest; // E51
  // net
  r.netProfit = r.grossProfit - r.totAcq - r.hardMoney - r.rehabCost - r.miscLessInterest; // B55
  r.roi = (r.netProfit+r.totalLender)/(r.totAcq+r.rehabCost); // B56
  r.irr = r.roi/r.days*360;                                  // B57
  return r;
}

const pct=(n)=> (n==null||isNaN(n))?'' : (n*100).toFixed(2)+'%';
function setIA(key,val){ const v=(val===''||val===null)?null:(isNaN(+val)?val:+val); D.ia.inputs[key]=v; OV._ia=D.ia.inputs; saveOV(); render('ia'); }
// ----- card-UI field renderers (label above input, like the MoM Connect form) -----
function fMoney(lab,key,val,opt){opt=opt||{};return `<div class="field${opt.full?' full':''}"><label>${lab}${opt.req?' <span class="req">*</span>':''}</label><div class="adorn"><span class="pre">$</span><input value="${val==null||val===''?'':val}" placeholder="0" onchange="setIA('${key}',this.value)"></div></div>`;}
function fPct(lab,key,val){return `<div class="field"><label>${lab}</label><div class="adorn"><input value="${val==null||val===''?'':(+(val*100).toFixed(6))}" placeholder="0" onchange="setIA('${key}',this.value===''?'':this.value/100)"><span class="suf">%</span></div></div>`;}
function fNum(lab,key,val){return `<div class="field"><label>${lab}</label><input value="${val==null?'':val}" placeholder="0" onchange="setIA('${key}',this.value)"></div>`;}
function fText(lab,key,val){return `<div class="field"><label>${lab}</label><input value="${val==null?'':val}" onchange="setIA('${key}',this.value)"></div>`;}
function fSelect(lab,key,val,opts,req){return `<div class="field"><label>${lab}${req?' <span class="req">*</span>':''}</label><select onchange="setIA('${key}',this.value)"><option value="">Select…</option>${opts.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select></div>`;}
function fDate(lab,key,val){return `<div class="field"><label>${lab}</label><input type="date" value="${val||''}" onchange="setIA('${key}',this.value)"></div>`;}
function fArea(lab,key,val){return `<div class="field full"><label>${lab}</label><textarea onchange="setIA('${key}',this.value)">${val==null?'':val}</textarea></div>`;}
// read-only computed TOTAL — the only kind of field that is NOT editable
function fAuto(lab,val,opt){opt=opt||{};const disp=opt.pct?pct(val):(opt.num?(Math.round(val*1e4)/1e4):money(val));return `<div class="field"><label>${lab} <span class="autotag">(auto)</span></label><input class="ro" readonly value="${disp}"></div>`;}

function renderIA(){
  const i=D.ia.inputs, r=computeIA(i);
  // section card with an "X / Y" filled-count badge over the editable inputs
  const sec=(title,keys,fields)=>{
    const filled=keys.filter(k=>{const v=i[k];return v!=null && v!=='';}).length;
    const badge=keys.length?` <span class="count">${filled} / ${keys.length}</span>`:'';
    return `<div class="section"><h2>${title}${badge}</h2><div class="grid">${fields.join('')}</div></div>`;
  };

  const general = sec('General',['address','mode','financingType','coeDate','eomDate'],[
    fText('Address','address',i.address),
    fSelect('Mode','mode',i.mode,D.ia.modeOptions),
    fSelect('Financing Type','financingType',i.financingType,D.ia.financingOptions),
    fDate('COE Date','coeDate',i.coeDate),
    fDate('EOM','eomDate',i.eomDate),

    fMoney('Due Diligence Cost','dueDiligence',i.dueDiligence),
    fMoney('Insurance','insurance',i.insurance),
    fMoney('Cash for Keys','cashForKeys',i.cashForKeys),
    fMoney('Escrow and Title','escrowTitlePurchase',i.escrowTitlePurchase),
    fMoney('Prorated Property Tax','proratedPropTaxPurchase',i.proratedPropTaxPurchase),
    fAuto('Total Purchase Costs', r.totalPurchase),

  const loan1 = sec('Lender Cost — 1st Loan',['interestRate1st','points1st','estLoanFees1st','appraisalFee','oddDays','dayInMonth','overrideLoanAmt','additional1stPayments','unused1stCredit','interestFrom1stPayoff'],[
    fPct('Interest Rate','interestRate1st',i.interestRate1st),

    fPct('Points','points1st',i.points1st),
    fMoney('Est. Loan Fees','estLoanFees1st',i.estLoanFees1st),
    fMoney('Appraisal Fee','appraisalFee',i.appraisalFee),
    fNum('Odd Days','oddDays',i.oddDays),

    fMoney('Override Loan Amount','overrideLoanAmt',i.overrideLoanAmt),
    fAuto('1st Loan Amount', r.loan1st),

    fAuto('90% of Cost', r.pct90Cost),
    fAuto('Mo. Payment', r.moPayment),
    fAuto('ProRated Payment', r.proratedPayment),
    fAuto('ShortFunds to Escrow', r.shortFunds),
    fMoney('Prepaid Interest 1st','ov_prepaidInt1st', r.prepaidInt1st),
    fMoney('Interest on New Loan 1st','ov_intOnNewLoan1st', r.intOnNewLoan1st),
    fMoney('Loan Origination Fee 1st','ov_loanOrig1st', r.loanOrig1st),
    fMoney('Loan Fees & Appraisal Fee 1st','ov_loanFeesAppr1st', r.loanFeesAppr1st),
    fMoney('Additional 1st Payments Made','additional1stPayments',i.additional1stPayments),
    fMoney('Unused 1st Payments Credit','unused1stCredit',i.unused1stCredit),
    fMoney('Interest from 1st Payoff','interestFrom1stPayoff',i.interestFrom1stPayoff)]);

  const loan2 = sec('Lender Cost — 2nd Loan',['interestRate2nd','points2nd','estLoanFees2nd','loan2ndAmount','prepaidInt2nd','loanFees2nd','additional2ndPayments','unused2ndCredit','interestFrom2ndPayoff'],[

    fMoney('2nd Loan Amount (Used)','loan2ndAmount',i.loan2ndAmount),
    fAuto('2nd Loan Amount (Suggested)', r.loan2ndSuggested),

    fMoney('Interest on New Loan 2nd','ov_intOnNewLoan2nd', r.intOnNewLoan2nd),
    fMoney('Loan Origination Fee 2nd','ov_loanOrig2nd', r.loanOrig2nd),

  const rehab = sec('Rehabilitation Costs',['estimatedRepairs','utilitiesRehab'],[

  const dev = sec('Total Development Cost',[],[

  const net = sec('Net Profits',['notes'],[

    fAuto('IRR', r.irr, {pct:1}),

  $('#panel').innerHTML = general+purchase+loan1+loan2+rehab+misc+gross+dev+net;
}

/* ----- QB export tab ----- */
function qbRows(){
  const rows=[];
  ['buySide','sellSide'].forEach(side=>{
    D[side].lines.forEach((l,i)=>{
      const s=lineState(side,i); if(s.amount==null) return;
      rows.push({Type:D[side].role, Date:D[side].date, Name:D[side].title, Memo:s.label,
                 Category:s.category, Sub:s.sub, Amount:s.amount, side, idx:i});
    });
  });
  return rows;
}
function renderQB(){
  const rows=qbRows();
  let html=`<div class="warn">QuickBooks export ledger. Every line carries the same dropdowns — change Category/Sub/Amount here if a mapping isn't 100%, and it stays consistent with the closing tabs. Download writes all four tabs to one .xlsx.</div>
   <div class="section"><h2>Ledger <span class="pill">${rows.length} lines</span></h2>
   <table><thead><tr><th>Date</th><th>Memo</th><th>Category</th><th>Sub</th><th class="num">Amount</th></tr></thead><tbody>`;
  rows.forEach(r=>{
    const k=r.side+':'+r.idx;
    html+=`<tr><td>${r.Date}</td><td>${r.Memo}</td>
      <td><select onchange="setOV('${k}','category',this.value);setOV('${k}','sub',D.taxonomy.categories[this.value][0]);render('qb')">${catOptions(r.Category)}</select></td>
      <td><select onchange="setOV('${k}','sub',this.value);render('qb')">${subOptions(r.Category,r.Sub)}</select></td>
      <td class="num"><input class="num" value="${r.Amount}" onchange="setOV('${k}','amount',this.value);render('qb')"></td></tr>`;
  });
  // category totals
  const tot={}; rows.forEach(r=>tot[r.Category]=(tot[r.Category]||0)+r.Amount);
  html+=`</tbody></table></div><div class="section"><h2>Totals by category</h2><table><tbody>`;
  Object.keys(tot).forEach(c=>html+=`<tr><td>${c}</td><td class="num">${money(tot[c])}</td></tr>`);
  html+=`</tbody></table></div>`;
  $('#panel').innerHTML=html;
}

/* ---------- xlsx export (all 4 tabs) ---------- */
function exportXlsx(){
  const wb=XLSX.utils.book_new();
  // IA
  const ia=D.ia.inputs;
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
    ['Investment Analysis','',], ['Status',D.deal.status],
    ...Object.entries(ia).map(([k,v])=>[k,v])
  ]), 'IA');
  // closings
  ['buySide','sellSide'].forEach((side,n)=>{
    const aoa=[['Line','Amount','Category','Sub','Confidence','Why']];
    D[side].lines.forEach((l,i)=>{const s=lineState(side,i);aoa.push([s.label,s.amount,s.category,s.sub,s.confidence+'%',s.why]);});
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(aoa), n? 'Sell-Side':'Buy-Side');
  });
  // QB
  const rows=qbRows();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
    rows.map(r=>({Type:r.Type,Date:r.Date,Name:r.Name,Memo:r.Memo,Category:r.Category,Sub:r.Sub,Amount:r.Amount}))
  ), 'QB Export');
  XLSX.writeFile(wb, '15620-ramona-closing.xlsx');
}

/* ---------- AI evaluate (optional server) ---------- */
async function evaluateDeal(){
  try{
    const res=await fetch('/api/evaluate',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({deal:D.deal,ia:D.ia.inputs,qb:qbRows()})});
    if(!res.ok) throw new Error('no server');
    const j=await res.json(); alert('AI Evaluation:\n\n'+(j.comment||JSON.stringify(j)));
  }catch(e){
    alert('AI Evaluate needs the backend running (server/index.js) with ANTHROPIC_API_KEY set.\nIn Replit: add the secret, run the server, then this button calls /api/evaluate.');
  }
}
function resetOverrides(){ if(confirm('Clear all your edits and restore the parsed mappings?')){ OV={}; localStorage.removeItem(LS); render('ia'); document.querySelector('.tab').click(); } }

/* apply persisted status/ia overrides before first render */
boot().then(()=>{ if(OV._status){D.deal.status=OV._status;} if(OV._ia){Object.assign(D.ia.inputs,OV._ia);} render('ia'); });
